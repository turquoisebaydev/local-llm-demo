<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a67b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="monitorGloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#252525;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="earInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb6c1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff99aa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="keyBevel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background wall (light beige) -->
  <rect width="800" height="600" fill="#e8e4db"/>
  
  <!-- Window reflection on wall -->
  <rect x="50" y="50" width="100" height="150" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Monitor (black, behind cat, with ambient reflections) -->
  <rect x="150" y="70" width="500" height="290" fill="#1a1a1a"/>
  <rect x="155" y="75" width="490" height="280" fill="url(#monitorGloss)"/>
  <!-- Monitor ambient reflection (ceiling lights/window) -->
  <ellipse cx="300" cy="120" rx="40" ry="20" fill="rgba(255,255,255,0.08)"/>
  <ellipse cx="500" cy="140" rx="35" ry="15" fill="rgba(255,255,255,0.06)"/>
  
  <!-- Desk (light brown wood) -->
  <rect x="0" y="420" width="800" height="180" fill="#c9a97a"/>
  
  <!-- Laptop (gold-colored body) -->
  <rect x="250" y="380" width="300" height="100" fill="url(#goldGradient)" rx="5"/>
  <!-- Laptop screen bezel -->
  <rect x="255" y="350" width="290" height="30" fill="#3a3a3a"/>
  <!-- Laptop screen (desktop interface with macOS-style) -->
  <rect x="265" y="358" width="270" height="15" fill="#1e3a5f"/>
  <!-- Dock/taskbar at bottom -->
  <rect x="265" y="365" width="270" height="8" fill="#2a4a7f"/>
  <!-- Dock icons -->
  <circle cx="275" cy="369" r="3" fill="#50c878"/>
  <circle cx="290" cy="369" r="3" fill="#e08e50"/>
  <circle cx="305" cy="369" r="3" fill="#a070c8"/>
  <circle cx="320" cy="369" r="3" fill="#4a90d9"/>
  <!-- Menu bar at top -->
  <rect x="265" y="359" width="270" height="4" fill="#2a4a7f"/>
  <!-- Apple logo substitute -->
  <circle cx="275" cy="361" r="2" fill="#ddd"/>
  <!-- Time display -->
  <rect x="480" y="360" width="25" height="5" fill="#ddd"/>
  
  <!-- Laptop keyboard area (black with 3D beveled keys) -->
  <rect x="260" y="390" width="280" height="80" fill="#1a1a1a"/>
  <!-- Keyboard rows with beveled keys -->
  <g>
    <!-- Top row (function keys - smaller) -->
    <rect x="270" y="393" width="16" height="10" fill="url(#keyBevel)"/>
    <rect x="290" y="393" width="16" height="10" fill="url(#keyBevel)"/>
    <rect x="310" y="393" width="16" height="10" fill="url(#keyBevel)"/>
    <rect x="330" y="393" width="16" height="10" fill="url(#keyBevel)"/>
    <rect x="350" y="393" width="16" height="10" fill="url(#keyBevel)"/>
    <rect x="370" y="393" width="16" height="10" fill="url(#keyBevel)"/>
    <rect x="390" y="393" width="16" height="10" fill="url(#keyBevel)"/>
    <rect x="410" y="393" width="16" height="10" fill="url(#keyBevel)"/>
    <rect x="430" y="393" width="16" height="10" fill="url(#keyBevel)"/>
    <rect x="450" y="393" width="16" height="10" fill="url(#keyBevel)"/>
    <!-- Home row -->
    <rect x="265" y="408" width="18" height="12" fill="url(#keyBevel)"/>
    <rect x="287" y="408" width="18" height="12" fill="url(#keyBevel)"/>
    <rect x="309" y="408" width="18" height="12" fill="url(#keyBevel)"/>
    <rect x="331" y="408" width="18" height="12" fill="url(#keyBevel)"/>
    <rect x="353" y="408" width="18" height="12" fill="url(#keyBevel)"/>
    <rect x="375" y="408" width="18" height="12" fill="url(#keyBevel)"/>
    <rect x="397" y="408" width="18" height="12" fill="url(#keyBevel)"/>
    <rect x="419" y="408" width="18" height="12" fill="url(#keyBevel)"/>
    <rect x="441" y="408" width="18" height="12" fill="url(#keyBevel)"/>
    <rect x="463" y="408" width="18" height="12" fill="url(#keyBevel)"/>
    <!-- Bottom row -->
    <rect x="260" y="424" width="18" height="12" fill="url(#keyBevel)"/>
    <rect x="282" y="424" width="18" height="12" fill="url(#keyBevel)"/>
    <rect x="304" y="424" width="18" height="12" fill="url(#keyBevel)"/>
    <rect x="326" y="424" width="18" height="12" fill="url(#keyBevel)"/>
    <rect x="348" y="424" width="18" height="12" fill="url(#keyBevel)"/>
    <rect x="370" y="424" width="18" height="12" fill="url(#keyBevel)"/>
    <rect x="392" y="424" width="18" height="12" fill="url(#keyBevel)"/>
    <rect x="414" y="424" width="18" height="12" fill="url(#keyBevel)"/>
    <rect x="436" y="424" width="18" height="12" fill="url(#keyBevel)"/>
    <!-- Space bar (longer) -->
    <rect x="320" y="440" width="140" height="14" rx="2" fill="url(#keyBevel)"/>
  </g>
  
  <!-- Cat body (lean, Devon Rex style - wiry, muscular) -->
  <!-- Main body with visible ribcage definition -->
  <ellipse cx="400" cy="340" rx="70" ry="60" fill="#f5f5f0"/>
  <!-- Ribcage/waist taper -->
  <path d="M 340 320 Q 335 350 340 380" stroke="#e0dcd5" stroke-width="2" fill="none"/>
  <path d="M 460 320 Q 465 350 460 380" stroke="#e0dcd5" stroke-width="2" fill="none"/>
  <!-- Tabby back with brownish-gray -->
  <ellipse cx="400" cy="330" rx="50" ry="45" fill="#a8a095"/>
  <!-- Tabby stripes on back -->
  <path d="M 365 310 Q 370 330 365 350" stroke="#6b655a" stroke-width="3" fill="none"/>
  <path d="M 385 305 Q 390 325 385 345" stroke="#6b655a" stroke-width="3" fill="none"/>
  <path d="M 415 305 Q 420 325 415 345" stroke="#6b655a" stroke-width="3" fill="none"/>
  <path d="M 435 310 Q 440 330 435 350" stroke="#6b655a" stroke-width="3" fill="none"/>
  <!-- Shoulder slope -->
  <path d="M 350 315 Q 360 325 370 330" stroke="#999188" stroke-width="2" fill="none"/>
  <path d="M 450 315 Q 440 325 430 330" stroke="#999188" stroke-width="2" fill="none"/>
  
  <!-- Cat head -->
  <ellipse cx="400" cy="260" rx="50" ry="43" fill="#f5f5f0"/>
  <!-- Jawline taper -->
  <path d="M 360 280 Q 355 295 362 305" stroke="#e0dcd5" stroke-width="1" fill="none"/>
  <path d="M 440 280 Q 445 295 438 305" stroke="#e0dcd5" stroke-width="1" fill="none"/>
  <!-- Tabby forehead M pattern -->
  <path d="M 388 232 L 396 245 L 400 250 L 404 245 L 412 232" stroke="#6b655a" stroke-width="2.5" fill="none"/>
  <!-- Cheek stripes -->
  <ellipse cx="372" cy="258" rx="10" ry="7" fill="#a8a095"/>
  <ellipse cx="428" cy="258" rx="10" ry="7" fill="#a8a095"/>
  
  <!-- Cat ears (large, upright, slightly rounded, pink inner) -->
  <path d="M 368 225 Q 372 195 375 192 Q 385 195 392 218 Z" fill="#f5f5f0"/>
  <path d="M 374 215 Q 376 198 378 196 Q 384 198 389 213 Z" fill="url(#earInner)"/>
  <path d="M 432 225 Q 428 195 425 192 Q 415 195 408 218 Z" fill="#f5f5f0"/>
  <path d="M 426 215 Q 424 198 422 196 Q 416 198 411 213 Z" fill="url(#earInner)"/>
  <!-- Ear rim whisker hairs -->
  <line x1="373" y1="198" x2="370" y2="190" stroke="#ddd" stroke-width="0.3"/>
  <line x1="427" y1="198" x2="430" y2="190" stroke="#ddd" stroke-width="0.3"/>
  
  <!-- Cat eyes (wide, almond-shaped, looking up-right) -->
  <path d="M 372 260 Q 378 252 388 258 Q 384 268 372 260 Z" fill="#9acd32"/>
  <path d="M 412 258 Q 418 250 428 256 Q 424 266 412 258 Z" fill="#9acd32"/>
  <!-- Eye highlights (top-left, suggesting overhead light) -->
  <ellipse cx="376" cy="254" rx="2.5" ry="3" fill="#fff"/>
  <ellipse cx="416" cy="252" rx="2" ry="2.5" fill="#fff"/>
  <!-- Pupils (black, vertical, slightly offset for gaze) -->
  <ellipse cx="380" cy="258" rx="2.5" ry="6" fill="#0a0a0a"/>
  <ellipse cx="420" cy="256" rx="2" ry="5.5" fill="#0a0a0a"/>
  
  <!-- Cat nose (pink triangular with speckles and nostrils) -->
  <polygon points="397,270 403,270 400,275" fill="#ffb6c1"/>
  <!-- Nose speckles -->
  <circle cx="399" cy="272" r="0.5" fill="#cc8899"/>
  <circle cx="401" cy="273" r="0.5" fill="#cc8899"/>
  <circle cx="400" cy="275" r="0.4" fill="#cc8899"/>
  <!-- Nostrils -->
  <ellipse cx="399" cy="274" rx="1" ry="0.5" fill="#cc8899"/>
  <ellipse cx="401" cy="274" rx="1" ry="0.5" fill="#cc8899"/>
  
  <!-- Cat mouth (closed) with whiskers (4-5 per side, varying lengths) -->
  <path d="M 398 276 Q 400 279 402 276" stroke="#888" stroke-width="0.7" fill="none"/>
  <!-- Whiskers left side (with shadows) -->
  <line x1="382" y1="270" x2="358" y2="273" stroke="#ddd" stroke-width="0.5"/>
  <line x1="382" y1="274" x2="355" y2="278" stroke="#ddd" stroke-width="0.5"/>
  <line x1="382" y1="278" x2="360" y2="283" stroke="#ddd" stroke-width="0.5"/>
  <line x1="382" y1="282" x2="365" y2="287" stroke="#ddd" stroke-width="0.5"/>
  <!-- Whiskers right side -->
  <line x1="418" y1="270" x2="442" y2="273" stroke="#ddd" stroke-width="0.5"/>
  <line x1="418" y1="274" x2="445" y2="278" stroke="#ddd" stroke-width="0.5"/>
  <line x1="418" y1="278" x2="440" y2="283" stroke="#ddd" stroke-width="0.5"/>
  <line x1="418" y1="282" x2="435" y2="287" stroke="#ddd" stroke-width="0.5"/>
  
  <!-- Cat collar (worn leather look with buckle) -->
  <ellipse cx="400" cy="298" rx="45" ry="9" fill="#c8c0b8"/>
  <!-- Collar wear texture -->
  <line x1="370" y1="296" x2="375" y2="299" stroke="#b8b0a8" stroke-width="0.5"/>
  <line x1="385" y1="298" x2="390" y2="295" stroke="#b8b0a8" stroke-width="0.5"/>
  <!-- Collar buckle -->
  <rect x="393" y="293" width="14" height="10" fill="#8b7355" rx="1"/>
  <rect x="396" y="295" width="8" height="6" fill="#a08060"/>
  <circle cx="400" cy="298" r="1" fill="#6b5b45"/>
  
  <!-- Cat front legs (planted firmly on keys, with joint definition) -->
  <rect x="382" y="365" width="12" height="32" fill="#f5f5f0"/>
  <rect x="406" y="365" width="12" height="32" fill="#f5f5f0"/>
  <!-- Leg joints -->
  <circle cx="388" cy="375" r="4" fill="#e8e0d8"/>
  <circle cx="412" cy="375" r="4" fill="#e8e0d8"/>
  
  <!-- Cat paws (white, planted on keyboard) -->
  <ellipse cx="388" cy="393" rx="9" ry="6" fill="#fff"/>
  <ellipse cx="412" cy="393" rx="9" ry="6" fill="#fff"/>
  <!-- Paw pads hint -->
  <ellipse cx="388" cy="395" rx="4" ry="2" fill="#ffb6c1"/>
  <ellipse cx="412" cy="395" rx="4" ry="2" fill="#ffb6c1"/>
  
  <!-- Cat tail (curled around front leg, clearly banded) -->
  <path d="M 470 335 Q 495 315 505 285 Q 508 260 495 250 Q 480 245 465 260 Q 455 280 458 305 Q 462 325 468 335" fill="#a8a095" stroke="#6b655a" stroke-width="1"/>
  <!-- Tail banding (alternating dark/light) -->
  <path d="M 472 330 Q 493 312 502 285" stroke="#6b655a" stroke-width="6" fill="none"/>
  <path d="M 502 285 Q 505 265 496 255" stroke="#f5f5f0" stroke-width="6" fill="none"/>
  <path d="M 496 255 Q 483 250 470 262" stroke="#6b655a" stroke-width="6" fill="none"/>
  
  <!-- Desk items -->
  <!-- Orange cable (with connector) -->
  <path d="M 100 450 Q 150 470 200 460 Q 250 450 280 440" stroke="#ff8c42" stroke-width="4" fill="none" stroke-linecap="round"/>
  <rect x="280" y="437" width="8" height="6" fill="#cc6633"/>
  <!-- Black cable -->
  <path d="M 120 480 Q 180 490 240 485 Q 300 475 320 460" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- White paper (with text lines/scribbles) -->
  <rect x="500" y="430" width="120" height="80" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  <!-- Text lines on paper -->
  <line x1="510" y1="445" x2="590" y2="445" stroke="#bbb" stroke-width="0.5"/>
  <line x1="510" y1="455" x2="580" y2="455" stroke="#bbb" stroke-width="0.5"/>
  <line x1="510" y1="465" x2="585" y2="465" stroke="#bbb" stroke-width="0.5"/>
  <line x1="510" y1="475" x2="575" y2="475" stroke="#bbb" stroke-width="0.5"/>
  <line x1="510" y1="485" x2="590" y2="485" stroke="#bbb" stroke-width="0.5"/>
  
  <!-- Black remote control (with buttons and logo) -->
  <rect x="550" y="510" width="25" height="70" rx="3" fill="#2a2a2a"/>
  <!-- Remote logo -->
  <text x="562" y="525" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">TV</text>
  <!-- Remote buttons -->
  <circle cx="562" cy="535" r="4" fill="#444"/>
  <circle cx="562" cy="545" r="4" fill="#444"/>
  <circle cx="562" cy="555" r="4" fill="#444"/>
  <circle cx="562" cy="565" r="4" fill="#444"/>
  <circle cx="562" cy="575" r="4" fill="#444"/>
  <circle cx="562" cy="585" r="4" fill="#444"/>
  
</svg>
