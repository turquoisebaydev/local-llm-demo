<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <!-- Wood grain texture -->
    <pattern id="wood" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#e8d5b7"/>
      <path d="M 0 10 Q 5 8 10 10 T 20 10" stroke="#d4c4a0" stroke-width="0.5" fill="none"/>
      <path d="M 0 15 Q 5 13 10 15 T 20 15" stroke="#d4c4a0" stroke-width="0.5" fill="none"/>
    </pattern>
    <!-- Tabby stripe pattern -->
    <pattern id="tabby" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 0 Q 10 20 0 40" stroke="#6b5b4b" stroke-width="3" fill="none" opacity="0.6"/>
      <path d="M 20 0 Q 30 20 20 40" stroke="#6b5b4b" stroke-width="3" fill="none" opacity="0.6"/>
    </pattern>
    <!-- Screen reflection gradient -->
    <linearGradient id="screenReflect" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Desk with wood grain -->
  <rect x="0" y="450" width="800" height="150" fill="url(#wood)"/>
  
  <!-- Remote control on desk -->
  <rect x="120" y="420" width="25" height="70" rx="3" fill="#222"/>
  <circle cx="132" cy="430" r="4" fill="#444"/>
  <circle cx="132" cy="445" r="4" fill="#444"/>
  <circle cx="132" cy="460" r="4" fill="#444"/>
  <circle cx="132" cy="475" r="4" fill="#444"/>
  
  <!-- Paper with text lines -->
  <rect x="160" y="425" width="40" height="55" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <line x1="168" y1="435" x2="192" y2="435" stroke="#ccc" stroke-width="1"/>
  <line x1="168" y1="443" x2="192" y2="443" stroke="#ccc" stroke-width="1"/>
  <line x1="168" y1="451" x2="188" y2="451" stroke="#ccc" stroke-width="1"/>
  <line x1="168" y1="459" x2="192" y2="459" stroke="#ccc" stroke-width="1"/>
  <line x1="168" y1="467" x2="185" y2="467" stroke="#ccc" stroke-width="1"/>
  
  <!-- Monitor with window reflection -->
  <rect x="90" y="40" width="620" height="400" fill="#dcdcdc"/>
  <rect x="100" y="50" width="600" height="380" fill="url(#screenReflect)"/>
  <!-- Window reflection -->
  <rect x="180" y="100" width="80" height="100" fill="#4a90d9" opacity="0.15" rx="5"/>
  <rect x="270" y="100" width="80" height="100" fill="#4a90d9" opacity="0.15" rx="5"/>
  <rect x="180" y="210" width="80" height="80" fill="#4a90d9" opacity="0.12" rx="5"/>
  <rect x="270" y="210" width="80" height="80" fill="#4a90d9" opacity="0.12" rx="5"/>
  
  <!-- Laptop body - Space Gray -->
  <rect x="180" y="340" width="440" height="130" fill="#5a5a5a" rx="5"/>
  
  <!-- Laptop screen - Safari browser -->
  <rect x="190" y="270" width="420" height="160" fill="#222"/>
  <!-- Tab bar -->
  <rect x="195" y="275" width="100" height="20" fill="#3a3a3a"/>
  <rect x="200" y="280" width="60" height="12" rx="2" fill="#555"/>
  <!-- Address bar -->
  <rect x="195" y="295" width="415" height="25" fill="#353535"/>
  <rect x="200" y="300" width="250" height="15" rx="2" fill="#444"/>
  <!-- Browser content -->
  <rect x="195" y="320" width="415" height="105" fill="#f5f5f5"/>
  <rect x="200" y="325" width="300" height="40" fill="#e0e0e0"/>
  <rect x="200" y="370" width="200" height="40" fill="#e0e0e0"/>
  
  <!-- Keyboard with backlit keys + black keycaps -->
  <rect x="200" y="360" width="400" height="90" fill="#1a1a1a"/>
  <g>
    <!-- Row 1 -->
    <rect x="210" y="370" width="28" height="16" fill="#333" rx="2"/>
    <rect x="243" y="370" width="28" height="16" fill="#333" rx="2"/>
    <rect x="276" y="370" width="28" height="16" fill="#333" rx="2"/>
    <rect x="309" y="370" width="28" height="16" fill="#333" rx="2"/>
    <rect x="342" y="370" width="28" height="16" fill="#333" rx="2"/>
    <rect x="375" y="370" width="28" height="16" fill="#333" rx="2"/>
    <rect x="408" y="370" width="28" height="16" fill="#333" rx="2"/>
    <rect x="441" y="370" width="28" height="16" fill="#333" rx="2"/>
    <rect x="474" y="370" width="28" height="16" fill="#333" rx="2"/>
    <!-- Row 2 -->
    <rect x="220" y="390" width="28" height="16" fill="#333" rx="2"/>
    <rect x="253" y="390" width="28" height="16" fill="#333" rx="2"/>
    <rect x="286" y="390" width="28" height="16" fill="#333" rx="2"/>
    <rect x="319" y="390" width="28" height="16" fill="#333" rx="2"/>
    <rect x="352" y="390" width="28" height="16" fill="#333" rx="2"/>
    <rect x="385" y="390" width="28" height="16" fill="#333" rx="2"/>
    <rect x="418" y="390" width="28" height="16" fill="#333" rx="2"/>
    <rect x="451" y="390" width="28" height="16" fill="#333" rx="2"/>
    <!-- Row 3 -->
    <rect x="230" y="410" width="28" height="16" fill="#333" rx="2"/>
    <rect x="263" y="410" width="28" height="16" fill="#333" rx="2"/>
    <rect x="296" y="410" width="28" height="16" fill="#333" rx="2"/>
    <rect x="329" y="410" width="28" height="16" fill="#333" rx="2"/>
    <rect x="362" y="410" width="28" height="16" fill="#333" rx="2"/>
    <rect x="395" y="410" width="28" height="16" fill="#333" rx="2"/>
    <rect x="428" y="410" width="28" height="16" fill="#333" rx="2"/>
    <rect x="461" y="410" width="28" height="16" fill="#333" rx="2"/>
    <!-- Spacebar -->
    <rect x="310" y="430" width="140" height="16" fill="#222" rx="3"/>
  </g>
  
  <!-- CAT - positioned on desk in front of laptop -->
  <g transform="translate(0, 80)">
    <!-- Tail wrapping around front left leg -->
    <g>
      <path d="M 450 380 Q 440 400 430 410 Q 420 425 410 430 Q 400 435 390 425" 
            stroke="#8b7355" stroke-width="12" fill="none" stroke-linecap="round"/>
      <path d="M 450 380 Q 440 400 430 410 Q 420 425 410 430 Q 400 435 390 425" 
            stroke="#5a4a3a" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="8,6"/>
    </g>
    
    <!-- Cat body - upright, white chest, tabby on back -->
    <path d="M 340 400 Q 330 440 345 470 L 455 470 Q 470 440 460 400 Q 450 370 400 365 Q 350 370 340 400" 
          fill="#f5f5f5"/>
    <!-- Tabby pattern on back (not chest) -->
    <path d="M 360 380 Q 400 370 440 380 Q 445 400 440 410 Q 400 400 360 410 Q 355 400 360 380" 
          fill="#f5deb3"/>
    <path d="M 360 380 Q 400 370 440 380 Q 445 400 440 410 Q 400 400 360 410 Q 355 400 360 380" 
          fill="url(#tabby)" opacity="0.4"/>
    <!-- Individual stripes -->
    <path d="M 370 380 Q 400 375 430 380" stroke="#5a4a3a" stroke-width="3" fill="none" opacity="0.6"/>
    <path d="M 375 395 Q 400 390 425 395" stroke="#5a4a3a" stroke-width="3" fill="none" opacity="0.6"/>
    
    <!-- Front legs -->
    <path d="M 370 460 L 370 485 L 390 485 L 390 460 Z" fill="#f5f5f5"/>
    <path d="M 410 460 L 410 485 L 430 485 L 430 460 Z" fill="#f5f5f5"/>
    
    <!-- Paw pads -->
    <ellipse cx="380" cy="490" rx="9" ry="6" fill="#ffb6c1"/>
    <ellipse cx="420" cy="490" rx="9" ry="6" fill="#ffb6c1"/>
    
    <!-- Cat head -->
    <g transform="rotate(-3, 400, 330)">
      <!-- Head shape -->
      <path d="M 360 330 Q 355 295 400 290 Q 445 295 440 330 Q 435 350 420 360 L 380 360 Q 365 350 360 330 Z" 
            fill="#f5deb3"/>
      <!-- White chest extending up -->
      <path d="M 375 355 L 425 355 L 420 365 L 380 365 Z" fill="#f5f5f5"/>
      
      <!-- Ears -->
      <polygon points="360,288 368,260 385,285" fill="#f5deb3" stroke="#8a7a6a" stroke-width="1"/>
      <polygon points="364,278 370,265 382,280" fill="#ffb6c1"/>
      <polygon points="440,288 432,260 415,285" fill="#f5deb3" stroke="#8a7a6a" stroke-width="1"/>
      <polygon points="418,280 430,265 436,278" fill="#ffb6c1"/>
      
      <!-- M marking -->
      <path d="M 388 295 L 393 305 L 398 298 L 403 305 L 408 298 L 413 305 L 418 295" 
            stroke="#5a4a3a" stroke-width="3" fill="none" opacity="0.8"/>
      
      <!-- Side stripes -->
      <path d="M 365 310 Q 360 325 362 335" stroke="#5a4a3a" stroke-width="3" fill="none" opacity="0.6"/>
      <path d="M 435 310 Q 440 325 438 335" stroke="#5a4a3a" stroke-width="3" fill="none" opacity="0.6"/>
      
      <!-- Eyes -->
      <ellipse cx="390" cy="325" rx="7" ry="9" fill="#fff"/>
      <ellipse cx="410" cy="325" rx="7" ry="9" fill="#fff"/>
      <ellipse cx="390" cy="325" rx="5" ry="8" fill="#9acd32"/>
      <ellipse cx="410" cy="325" rx="5" ry="8" fill="#9acd32"/>
      <rect x="388" y="321" width="4" height="8" fill="#000" rx="2"/>
      <rect x="408" y="321" width="4" height="8" fill="#000" rx="2"/>
      
      <!-- Nose -->
      <polygon points="395,338 405,338 400,345" fill="#c48b7a"/>
      
      <!-- Mouth -->
      <path d="M 394 347 Q 400 352 406 347" stroke="#666" stroke-width="1" fill="none"/>
      
      <!-- Whiskers -->
      <line x1="385" y1="342" x2="368" y2="340" stroke="#666" stroke-width="0.5"/>
      <line x1="385" y1="346" x2="368" y2="346" stroke="#666" stroke-width="0.5"/>
      <line x1="385" y1="350" x2="368" y2="352" stroke="#666" stroke-width="0.5"/>
      <line x1="415" y1="342" x2="432" y2="340" stroke="#666" stroke-width="0.5"/>
      <line x1="415" y1="346" x2="432" y2="346" stroke="#666" stroke-width="0.5"/>
      <line x1="415" y1="350" x2="432" y2="352" stroke="#666" stroke-width="0.5"/>
    </g>
    
    <!-- Collar - light beige/grey -->
    <rect x="375" y="365" width="50" height="10" rx="2" fill="#d2c8b6"/>
    <rect x="395" y="363" width="10" height="14" fill="#a0a0a0"/>
    <circle cx="400" cy="370" r="3" fill="#cd7f32"/>
  </g>
  
  <!-- Orange USB-C cable on right side -->
  <path d="M 620 380 Q 650 380 680 390 Q 720 400 750 420" stroke="#ff6600" stroke-width="7" fill="none" stroke-linecap="round"/>
  <rect x="618" y="377" width="8" height="6" fill="#666" rx="1"/>
</svg>
