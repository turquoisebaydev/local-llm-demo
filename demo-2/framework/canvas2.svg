<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="catWhite" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fffef8"/>
      <stop offset="100%" style="stop-color:#f0efe8"/>
    </linearGradient>
    <linearGradient id="macbookGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c4a8"/>
      <stop offset="50%" style="stop-color:#d4a888"/>
      <stop offset="100%" style="stop-color:#c49470"/>
    </linearGradient>
    <pattern id="wavyFur" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 0 10 Q 5 5 10 10 Q 15 15 20 10" stroke="#d0d0d0" stroke-width="0.5" fill="none" opacity="0.3"/>
      <path d="M 0 15 Q 5 10 10 15 Q 15 20 20 15" stroke="#d0d0d0" stroke-width="0.5" fill="none" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Wall -->
  <rect width="800" height="600" fill="#f2f0e8"/>
  
  <!-- Large monitor (widescreen, with reflection) -->
  <rect x="180" y="50" width="440" height="260" fill="#0a0a0a"/>
  <rect x="185" y="55" width="430" height="250" fill="#000"/>
  <ellipse cx="380" cy="150" rx="60" ry="30" fill="#1a1a1a" opacity="0.6"/>
  <ellipse cx="380" cy="145" rx="40" ry="18" fill="#252525" opacity="0.5"/>
  <rect x="370" y="290" width="60" height="15" fill="#1a1a1a"/>
  <rect x="350" y="305" width="100" height="8" fill="#0a0a0a"/>
  
  <!-- Desk -->
  <rect x="0" y="380" width="800" height="220" fill="#c9a978"/>
  <g stroke="#b89568" stroke-width="2" opacity="0.4">
    <line x1="0" y1="410" x2="800" y2="415"/>
    <line x1="0" y1="450" x2="800" y2="445"/>
    <line x1="0" y1="490" x2="800" y2="495"/>
    <line x1="0" y1="530" x2="800" y2="525"/>
  </g>
  
  <!-- Orange cable (FAR LEFT) -->
  <path d="M 40 450 Q 65 450 80 470 Q 65 490 40 490 Q 15 490 0 470 Q 15 450 40 450" fill="none" stroke="#ff5500" stroke-width="6" stroke-linecap="round"/>
  <path d="M 40 456 Q 60 456 72 472 Q 60 488 40 488 Q 20 488 8 472 Q 20 456 40 456" fill="none" stroke="#ff6600" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Papers -->
  <rect x="100" y="425" width="80" height="60" fill="#f8f6f0"/>
  <g stroke="#d0d0d0" stroke-width="1">
    <line x1="110" y1="440" x2="170" y2="440"/>
    <line x1="110" y1="452" x2="165" y2="452"/>
    <line x1="110" y1="464" x2="160" y2="464"/>
  </g>
  
  <!-- Phone/remote -->
  <rect x="200" y="440" width="30" height="65" rx="4" fill="#1a1a1a"/>
  <rect x="205" y="445" width="20" height="45" fill="#2a2a2a"/>
  
  <!-- MacBook -->
  <rect x="150" y="330" width="500" height="135" fill="url(#macbookGold)"/>
  <rect x="155" y="335" width="490" height="125" fill="url(#macbookGold)"/>
  <rect x="160" y="210" width="480" height="115" fill="#1a1a1a"/>
  <rect x="165" y="215" width="470" height="105" fill="#e8f4fc"/>
  <rect x="165" y="215" width="470" height="14" fill="#f5f5f5"/>
  <circle cx="215" cy="260" r="14" fill="#3498db"/>
  <circle cx="285" cy="260" r="14" fill="#27ae60"/>
  <circle cx="215" cy="300" r="14" fill="#e74c3c"/>
  <circle cx="285" cy="300" r="14" fill="#f39c12"/>
  
  <!-- Keyboard -->
  <rect x="170" y="345" width="460" height="52" fill="#0a0a0a"/>
  <g fill="#e8e8e8">
    <rect x="180" y="353" width="15" height="9" rx="1.5"/>
    <rect x="202" y="353" width="15" height="9" rx="1.5"/>
    <rect x="224" y="353" width="15" height="9" rx="1.5"/>
    <rect x="500" y="353" width="15" height="9" rx="1.5"/>
    <rect x="522" y="353" width="15" height="9" rx="1.5"/>
    <rect x="544" y="353" width="15" height="9" rx="1.5"/>
  </g>
  <rect x="365" y="403" width="80" height="47" fill="#b0b0b0"/>
  
  <!-- DEVON REX CAT -->
  <!-- Slender body with rib contours -->
  <path d="M 320 420 Q 320 390 340 380 Q 340 410 330 430 Q 340 450 380 455 Q 420 455 460 450 Q 470 430 460 410 Q 450 390 480 385 Q 490 400 490 425 Q 490 450 470 465 Q 420 470 370 465 Q 330 455 320 420" fill="url(#catWhite)"/>
  <!-- Rib contours -->
  <path d="M 335 400 Q 350 400 355 410" stroke="#e0e0d8" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 340 412 Q 355 412 360 422" stroke="#e0e0d8" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 345 424 Q 360 424 365 434" stroke="#e0e0d8" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 435 405 Q 450 405 455 415" stroke="#e0e0d8" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 430 417 Q 445 417 450 427" stroke="#e0e0d8" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 425 429 Q 440 429 445 439" stroke="#e0e0d8" stroke-width="1" fill="none" opacity="0.5"/>
  
  <!-- Rounded head (less wedge) -->
  <path d="M 350 375 Q 345 350 350 325 Q 355 300 380 300 Q 420 300 445 305 Q 455 325 455 375 Q 455 395 420 402 Q 380 405 350 395 Q 345 385 350 375" fill="url(#catWhite)"/>
  
  <!-- Tabby patches -->
  <ellipse cx="355" cy="340" rx="20" ry="16" fill="#8a8a90"/>
  <ellipse cx="445" cy="340" rx="20" ry="16" fill="#8a8a90"/>
  <path d="M 358 315 Q 400 320 442 315 Q 437 310 400 310 Q 363 310 358 315" fill="#8a8a90"/>
  <!-- Body patches -->
  <ellipse cx="330" cy="420" rx="22" ry="18" fill="#9898a0"/>
  <ellipse cx="470" cy="425" rx="20" ry="16" fill="#a89880"/>
  
  <!-- Large ears (wide-set, very large) -->
  <path d="M 348 325 L 362 355 L 335 340 Z" fill="url(#catWhite)"/>
  <path d="M 452 325 L 438 355 L 465 340 Z" fill="url(#catWhite)"/>
  <path d="M 351 330 L 361 350 L 338 342 Z" fill="#ffc0c0"/>
  <path d="M 449 330 L 439 350 L 462 342 Z" fill="#ffc0c0"/>
  
  <!-- Almond eyes (smaller, closer together) -->
  <ellipse cx="375" cy="365" rx="12" ry="14" fill="#85bb65"/>
  <ellipse cx="425" cy="365" rx="12" ry="14" fill="#85bb65"/>
  <ellipse cx="375" cy="365" rx="2.5" ry="9" fill="#0a0a0a"/>
  <ellipse cx="425" cy="365" rx="2.5" ry="9" fill="#0a0a0a"/>
  <ellipse cx="372" cy="362" rx="3.5" ry="4.5" fill="#ffffff"/>
  <ellipse cx="422" cy="362" rx="3.5" ry="4.5" fill="#ffffff"/>
  
  <!-- Nose -->
  <path d="M 394 382 L 406 382 L 400 388 Z" fill="#d48a8a"/>
  
  <!-- Mouth -->
  <path d="M 397 388 Q 400 394 403 388" stroke="#6a5a4a" fill="none" stroke-width="1.5"/>
  <path d="M 400 394 L 400 399" stroke="#6a5a4a" fill="none" stroke-width="1.5"/>
  
  <!-- Whiskers -->
  <g stroke="#e8e8e0" stroke-width="0.8" opacity="0.5">
    <line x1="350" y1="382" x2="325" y2="378"/>
    <line x1="350" y1="387" x2="323" y2="385"/>
    <line x1="350" y1="392" x2="327" y2="395"/>
    <line x1="450" y1="382" x2="475" y2="378"/>
    <line x1="450" y1="387" x2="477" y2="385"/>
    <line x1="450" y1="392" x2="473" y2="395"/>
  </g>
  
  <!-- Collar (high, snug around neck) -->
  <path d="M 365 392 Q 400 405 435 392" stroke="#a8a8b0" fill="none" stroke-width="7" stroke-linecap="round"/>
  <rect x="392" y="398" width="16" height="11" rx="2" fill="#9898a0"/>
  <rect x="395" y="400" width="10" height="7" fill="#888890"/>
  
  <!-- Tail (thick at base, ringed) -->
  <path d="M 475 430 Q 510 445 512 485 Q 502 520 465 525 Q 428 520 415 485" fill="none" stroke="url(#catWhite)" stroke-width="22" stroke-linecap="round"/>
  <!-- Ringed pattern -->
  <path d="M 482 440 Q 505 452 508 475" fill="none" stroke="#35353a" stroke-width="4" stroke-linecap="round"/>
  <path d="M 495 460 Q 510 475 507 495" fill="none" stroke="#35353a" stroke-width="4" stroke-linecap="round"/>
  <path d="M 485 480 Q 470 500 455 510" fill="none" stroke="#35353a" stroke-width="4" stroke-linecap="round"/>
  <path d="M 445 515 Q 425 518 418 505" fill="none" stroke="#35353a" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Paws (on keyboard, detailed) -->
  <ellipse cx="375" cy="465" rx="14" ry="10" fill="#f8f8f5"/>
  <ellipse cx="425" cy="465" rx="14" ry="10" fill="#f8f8f5"/>
  <!-- Paw pads hint -->
  <ellipse cx="375" cy="468" rx="6" ry="4" fill="#e0e0d8" opacity="0.6"/>
  <ellipse cx="425" cy="468" rx="6" ry="4" fill="#e0e0d8" opacity="0.6"/>
</svg>
