<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Wall gradient -->
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a4a"/>
      <stop offset="100%" style="stop-color:#3d3d3d"/>
    </linearGradient>
    
    <!-- Cat fur gradient -->
    <linearGradient id="catGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c8a8"/>
      <stop offset="100%" style="stop-color:#c49668"/>
    </linearGradient>
    
    <!-- Desk gradient -->
    <linearGradient id="deskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b87a"/>
      <stop offset="100%" style="stop-color:#b8965e"/>
    </linearGradient>
    
    <!-- Laptop gradient -->
    <linearGradient id="laptopGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8d0d8"/>
      <stop offset="100%" style="stop-color:#a8b0b8"/>
    </linearGradient>
  </defs>
  
  <!-- Background wall -->
  <rect width="800" height="600" fill="url(#wallGrad)"/>
  
  <!-- Window light area -->
  <rect x="200" y="50" width="400" height="150" fill="#7b7b7b"/>
  <rect x="220" y="70" width="360" height="110" fill="#a8a8a8"/>
  
  <!-- Monitor -->
  <rect x="260" y="180" width="280" height="140" fill="#1a1a1a"/>
  <rect x="270" y="190" width="260" height="120" fill="#0a0a0a"/>
  <rect x="220" y="320" width="360" height="15" fill="#3a3a3a"/>
  
  <!-- Desk -->
  <rect x="0" y="400" width="800" height="200" fill="url(#deskGrad)"/>
  
  <!-- Papers on desk -->
  <rect x="50" y="420" width="80" height="100" fill="#f5f5f5"/>
  <rect x="60" y="430" width="60" height="5" fill="#ddd"/>
  <rect x="60" y="440" width="50" height="5" fill="#ddd"/>
  <rect x="60" y="450" width="55" height="5" fill="#ddd"/>
  <rect x="45" y="480" width="90" height="80" fill="#fff"/>
  <rect x="55" y="490" width="70" height="4" fill="#ddd"/>
  <rect x="55" y="500" width="65" height="4" fill="#ddd"/>
  
  <!-- Orange cable -->
  <path d="M150,420 Q180,440 200,460 T240,480" stroke="#ff6600" stroke-width="4" fill="none"/>
  
  <!-- MacBook -->
  <rect x="280" y="340" width="240" height="180" fill="url(#laptopGrad)"/>
  <rect x="290" y="350" width="220" height="160" fill="#0a0a0a"/>
  <rect x="280" y="520" width="240" height="10" fill="#98a0a8"/>
  
  <!-- Cat body with curves -->
  <path d="M350,400 Q340,450 350,500 Q375,520 400,520 Q425,520 450,500 Q460,450 450,400 Q425,380 400,380 Q375,380 350,400" fill="url(#catGrad)"/>
  
  <!-- Cat white chest/belly -->
  <path d="M375,430 Q370,480 400,500 Q430,480 425,430 Q400,440 375,430" fill="#f5f5dc"/>
  
  <!-- Cat head -->
  <ellipse cx="400" cy="380" rx="48" ry="42" fill="url(#catGrad)"/>
  
  <!-- Cat ears -->
  <polygon points="360,345 372,315 400,340" fill="url(#catGrad)"/>
  <polygon points="372,332 378,322 388,335" fill="#ffb6c1"/>
  <polygon points="440,345 428,315 400,340" fill="url(#catGrad)"/>
  <polygon points="428,332 422,322 412,335" fill="#ffb6c1"/>
  
  <!-- Tabby stripes on head -->
  <path d="M380,360 Q390,355 400,360" stroke="#b89668" stroke-width="3" fill="none"/>
  <path d="M410,360 Q420,355 430,360" stroke="#b89668" stroke-width="3" fill="none"/>
  
  <!-- Eyes - yellow-green focused -->
  <ellipse cx="385" cy="378" rx="7" ry="9" fill="#6b8e23"/>
  <ellipse cx="415" cy="378" rx="7" ry="9" fill="#6b8e23"/>
  <ellipse cx="385" cy="376" rx="2" ry="6" fill="#0a0a0a"/>
  <ellipse cx="415" cy="376" rx="2" ry="6" fill="#0a0a0a"/>
  <circle cx="387" cy="374" r="2" fill="#fff"/>
  <circle cx="417" cy="374" r="2" fill="#fff"/>
  
  <!-- Nose -->
  <polygon points="396,388 404,388 400,395" fill="#ffb6c1"/>
  
  <!-- Mouth -->
  <path d="M400,395 Q395,405 390,400" stroke="#8b7355" stroke-width="1.5" fill="none"/>
  <path d="M400,395 Q405,405 410,400" stroke="#8b7355" stroke-width="1.5" fill="none"/>
  
  <!-- Collar with tag -->
  <path d="M368,412 Q400,428 432,412" stroke="#696969" stroke-width="7" fill="none"/>
  <circle cx="400" cy="420" r="8" fill="#ffd700"/>
  
  <!-- Whiskers -->
  <line x1="355" y1="388" x2="325" y2="383" stroke="#f5f5dc" stroke-width="1.5"/>
  <line x1="355" y1="393" x2="325" y2="395" stroke="#f5f5dc" stroke-width="1.5"/>
  <line x1="445" y1="388" x2="475" y2="383" stroke="#f5f5dc" stroke-width="1.5"/>
  <line x1="445" y1="393" x2="475" y2="395" stroke="#f5f5dc" stroke-width="1.5"/>
</svg>
