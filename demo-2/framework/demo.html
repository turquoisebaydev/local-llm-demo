<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Multi-Agent SVG Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 1920px; height: 1080px; overflow: hidden;
      background: #0a0a1a; font-family: monospace; color: #fff;
    }
    .header {
      height: 50px; display: flex; align-items: center; justify-content: center; gap: 30px;
    }
    .header h1 { font-size: 1.3rem; color: #667eea; }
    .timer { font-size: 1.1rem; color: #e94560; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
      gap: 8px;
      padding: 0 10px 10px;
      height: 1020px;
    }
    .panel {
      background: #1a1a2e;
      border: 2px solid #333;
      border-radius: 6px;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .panel h2 {
      font-size: 0.85rem;
      padding: 6px;
      text-align: center;
      color: #e94560;
      background: #0f0f23;
      flex-shrink: 0;
    }
    .panel h2.ref { color: #667eea; }
    .svg-view {
      flex: 1;
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .svg-view img, .svg-view object {
      width: 100%; height: 100%; object-fit: contain;
    }
    .status {
      padding: 4px;
      background: #0f0f23;
      font-size: 0.7rem;
      text-align: center;
      flex-shrink: 0;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎨 Multi-Agent SVG Demo</h1>
    <div class="timer" id="timer">Waiting for agents...</div>
  </div>
  <div class="grid">
    <div class="panel">
      <h2 class="ref">📋 Reference</h2>
      <div class="svg-view">
        <img src="reference.jpg">
      </div>
      <div class="status">Target image</div>
    </div>
    <div class="panel">
      <h2>🤖 Agent 1 — RTX PRO 6000</h2>
      <div class="svg-view">
        <object id="canvas1" data="canvas1.svg" type="image/svg+xml"></object>
      </div>
      <div class="status" id="status1">Waiting...</div>
    </div>
    <div class="panel">
      <h2>🤖 Agent 2 — RTX 5090</h2>
      <div class="svg-view">
        <object id="canvas2" data="canvas2.svg" type="image/svg+xml"></object>
      </div>
      <div class="status" id="status2">Waiting...</div>
    </div>
    <div class="panel">
      <h2>🤖 Agent 3 — RTX 4090</h2>
      <div class="svg-view">
        <object id="canvas3" data="canvas3.svg" type="image/svg+xml"></object>
      </div>
      <div class="status" id="status3">Waiting...</div>
    </div>
    <div class="panel">
      <h2>🤖 Agent 4 — RTX 3090</h2>
      <div class="svg-view">
        <object id="canvas4" data="canvas4.svg" type="image/svg+xml"></object>
      </div>
      <div class="status" id="status4">Waiting...</div>
    </div>
  </div>
  <script>
    const start = Date.now();
    setInterval(() => {
      const elapsed = Math.floor((Date.now() - start) / 1000);
      const m = Math.floor(elapsed / 60);
      const s = elapsed % 60;
      document.getElementById('timer').textContent = `${m}:${String(s).padStart(2,'0')} elapsed`;
      for (let i = 1; i <= 4; i++) {
        const obj = document.getElementById('canvas' + i);
        obj.data = 'canvas' + i + '.svg?t=' + Date.now();
        document.getElementById('status' + i).textContent = new Date().toLocaleTimeString();
      }
    }, 2000);
  </script>
</body>
</html>
