<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff700"/>
      <stop offset="100%" style="stop-color:#ff6600"/>
    </radialGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="800" height="600" fill="url(#sky)"/>
  
  <!-- Sun -->
  <circle cx="600" cy="150" r="60" fill="url(#sun)" opacity="0.9"/>
  <circle cx="600" cy="150" r="80" fill="url(#sun)" opacity="0.3"/>
  
  <!-- Mountains -->
  <polygon points="0,600 200,300 400,600" fill="#1a3a1a"/>
  <polygon points="300,600 550,250 800,600" fill="#2d4a2d"/>
  <polygon points="100,600 350,350 600,600" fill="#1f2f1f" opacity="0.8"/>
  
  <!-- Ground -->
  <rect y="550" width="800" height="50" fill="#1a4a1a"/>
  
  <!-- Stars -->
  <circle cx="80" cy="60" r="2" fill="#fff"/>
  <circle cx="150" cy="100" r="1.5" fill="#fff"/>
  <circle cx="700" cy="80" r="2" fill="#fff"/>
  <circle cx="750" cy="120" r="1.5" fill="#fff"/>
  <circle cx="400" cy="50" r="1.5" fill="#fff"/>
  <circle cx="500" cy="90" r="2" fill="#fff"/>
  
  <!-- Cloud -->
  <ellipse cx="200" cy="120" rx="40" ry="20" fill="#fff" opacity="0.7"/>
  <ellipse cx="240" cy="110" rx="35" ry="18" fill="#fff" opacity="0.7"/>
  <ellipse cx="170" cy="125" rx="30" ry="15" fill="#fff" opacity="0.7"/>
  
  <!-- Tree silhouette -->
  <rect x="700" y="450" width="8" height="100" fill="#0d1a0d"/>
  <circle cx="704" cy="430" r="35" fill="#1a3a1a"/>
  <circle cx="680" cy="450" r="25" fill="#1a3a1a"/>
  <circle cx="730" cy="450" r="25" fill="#1a3a1a"/>
  
  <!-- Moon rays -->
  <line x1="600" y1="90" x2="580" y2="50" stroke="#fff700" stroke-width="1" opacity="0.4"/>
  <line x1="660" y1="150" x2="700" y2="130" stroke="#fff700" stroke-width="1" opacity="0.4"/>
  <line x1="600" y1="210" x2="590" y2="250" stroke="#fff700" stroke-width="1" opacity="0.4"/>
  
  <!-- Title -->
  <text x="400" y="585" font-family="monospace" font-size="18" fill="#888" text-anchor="middle">REFERENCE SCENE</text>
</svg>