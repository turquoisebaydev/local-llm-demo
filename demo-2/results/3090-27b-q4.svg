<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="eyeGradient">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="35%" stop-color="#B8C95E"/>
      <stop offset="70%" stop-color="#9AB84E"/>
      <stop offset="100%" stop-color="#B8C95E"/>
    </radialGradient>
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4d4e8"/>
      <stop offset="100%" stop-color="#a8b8d8"/>
    </linearGradient>
  </defs>
  
  <!-- Background with window/geometric panel -->
  <rect width="800" height="380" fill="#0a0a0a"/>
  <!-- Geometric window framing -->
  <rect x="0" y="0" width="800" height="80" fill="#1a1a1a"/>
  <line x1="0" y1="0" x2="800" y2="0" stroke="#2a2a2a" stroke-width="3"/>
  <line x1="0" y1="80" x2="800" y2="80" stroke="#2a2a2a" stroke-width="3"/>
  <line x1="200" y1="0" x2="200" y2="80" stroke="#2a2a2a" stroke-width="3"/>
  <line x1="400" y1="0" x2="400" y2="80" stroke="#2a2a2a" stroke-width="3"/>
  <line x1="600" y1="0" x2="600" y2="80" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Ceiling light squares -->
  <rect x="210" y="10" width="40" height="40" fill="#3a3a3a"/>
  <rect x="410" y="10" width="40" height="40" fill="#3a3a3a"/>
  
  <!-- Black monitor behind -->
  <rect x="180" y="120" width="440" height="260" fill="#000000" rx="3"/>
  
  <!-- Desk surface - wooden -->
  <rect y="380" width="800" height="220" fill="#c9a884"/>
  <line x1="50" y1="420" x2="750" y2="420" stroke="#b89470" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="480" x2="720" y2="480" stroke="#b89470" stroke-width="2" opacity="0.5"/>
  <line x1="30" y1="540" x2="680" y2="540" stroke="#b89470" stroke-width="2" opacity="0.5"/>
  
  <!-- Laptop - rose gold MacBook -->
  <rect x="200" y="370" width="400" height="130" fill="#d4b494" rx="4"/>
  
  <!-- Screen with desktop -->
  <rect x="215" y="180" width="370" height="185" fill="url(#screenGradient)" rx="2"/>
  <rect x="230" y="200" width="25" height="30" fill="#ffffff" opacity="0.9"/>
  <rect x="230" y="240" width="25" height="30" fill="#ffffff" opacity="0.9"/>
  <rect x="230" y="280" width="25" height="30" fill="#ffffff" opacity="0.9"/>
  <rect x="215" y="180" width="370" height="18" fill="#d0d8e0"/>
  
  <!-- Keyboard area - cat sits ON it -->
  <rect x="215" y="385" width="370" height="105" fill="#1a1a1a" rx="2"/>
  <g fill="#333" opacity="0.6">
    <rect x="230" y="395" width="8" height="8"/>
    <rect x="245" y="395" width="8" height="8"/>
    <rect x="260" y="395" width="8" height="8"/>
    <rect x="275" y="395" width="8" height="8"/>
    <rect x="290" y="395" width="8" height="8"/>
    <rect x="305" y="395" width="8" height="8"/>
    <rect x="320" y="395" width="8" height="8"/>
    <rect x="335" y="395" width="8" height="8"/>
    <rect x="230" y="410" width="8" height="8"/>
    <rect x="245" y="410" width="8" height="8"/>
    <rect x="260" y="410" width="8" height="8"/>
    <rect x="275" y="410" width="8" height="8"/>
    <rect x="290" y="410" width="8" height="8"/>
    <rect x="305" y="410" width="8" height="8"/>
  </g>
  <!-- Trackpad -->
  <rect x="340" y="445" width="120" height="35" fill="#3a3a3a" rx="2"/>
  
  <!-- Orange cable plugged into laptop -->
  <path d="M 480 370 Q 500 365 520 380 Q 530 400 510 420 Q 480 440 450 430" 
        stroke="#FF6600" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- USB-C connector -->
  <rect x="475" y="368" width="10" height="4" fill="#FF6600" rx="1"/>
  
  <!-- Devon Rex Cat - sitting DIRECTLY on keyboard -->
  <!-- Tail with dark rings - wrapped around front paws -->
  <path d="M 465 445 Q 495 435 505 405 Q 510 375 500 355 Q 490 340 480 350" 
        stroke="#4a4a4a" stroke-width="13" fill="none" stroke-linecap="round"/>
  <path d="M 485 365" stroke="#2a2a2a" stroke-width="14" stroke-linecap="round"/>
  <path d="M 493 385" stroke="#2a2a2a" stroke-width="14" stroke-linecap="round"/>
  <path d="M 500 405" stroke="#2a2a2a" stroke-width="14" stroke-linecap="round"/>
  
  <!-- Slender body - white chest/belly -->
  <ellipse cx="400" cy="425" rx="38" ry="50" fill="#F8F4F0"/>
  
  <!-- Back/shoulders - wavy/curled fur texture -->
  <ellipse cx="398" cy="390" rx="42" ry="42" fill="#C9B8A8"/>
  <!-- Wavy fur lines -->
  <path d="M 370 375 Q 378 370 385 374 Q 392 370 400 373" stroke="#7A6B5E" stroke-width="2" fill="none"/>
  <path d="M 375 385 Q 382 380 390 383 Q 398 380 405 382" stroke="#7A6B5E" stroke-width="2" fill="none"/>
  <path d="M 415 375 Q 422 370 430 373 Q 438 370 445 373" stroke="#7A6B5E" stroke-width="2" fill="none"/>
  
  <!-- Slender legs -->
  <ellipse cx="385" cy="460" rx="11" ry="14" fill="#F8F4F0"/>
  <ellipse cx="415" cy="460" rx="11" ry="14" fill="#F8F4F0"/>
  <!-- Paws on trackpad -->
  <ellipse cx="385" cy="468" rx="10" ry="8" fill="#F8F4F0"/>
  <ellipse cx="415" cy="468" rx="10" ry="8" fill="#F8F4F0"/>
  <!-- Paw pads -->
  <ellipse cx="385" cy="472" rx="5" ry="3.5" fill="#D4A79C"/>
  <ellipse cx="415" cy="472" rx="5" ry="3.5" fill="#D4A79C"/>
  
  <!-- Head -->
  <ellipse cx="400" cy="325" rx="42" ry="38" fill="#F8F4F0"/>
  
  <!-- Tabby patches -->
  <ellipse cx="390" cy="310" rx="22" ry="18" fill="#C9B8A8"/>
  <ellipse cx="410" cy="310" rx="22" ry="18" fill="#C9B8A8"/>
  <!-- M marking -->
  <path d="M 390 300 L 385 290 L 395 300 L 400 295 L 405 300 L 415 290 L 410 300" 
        stroke="#7A6B5E" stroke-width="2" fill="none"/>
  
  <!-- Large ears -->
  <polygon points="365,295 355,250 380,285" fill="#F8F4F0" stroke="#7A6B5E" stroke-width="1.5"/>
  <polygon points="435,295 445,250 420,285" fill="#F8F4F0" stroke="#7A6B5E" stroke-width="1.5"/>
  <polygon points="368,290 360,260 375,282" fill="#FFD9CC"/>
  <polygon points="432,290 440,260 425,282" fill="#FFD9CC"/>
  
  <!-- Green eyes -->
  <circle cx="388" cy="325" r="10" fill="url(#eyeGradient)"/>
  <circle cx="412" cy="325" r="10" fill="url(#eyeGradient)"/>
  <circle cx="385" cy="322" r="2.5" fill="#FFFFFF"/>
  <circle cx="409" cy="322" r="2.5" fill="#FFFFFF"/>
  
  <!-- Pink nose -->
  <polygon points="397,338 403,338 400,344" fill="#D4A79C"/>
  
  <!-- Upturned mouth - curious expression -->
  <path d="M 400 344 Q 394 350 391 348" stroke="#888" stroke-width="1" fill="none"/>
  <path d="M 400 344 Q 406 350 409 348" stroke="#888" stroke-width="1" fill="none"/>
  
  <!-- Whiskers -->
  <g stroke="#eeeeee" stroke-width="1">
    <line x1="375" y1="335" x2="350" y2="338"/>
    <line x1="375" y1="340" x2="352" y2="342"/>
    <line x1="375" y1="345" x2="355" y2="350"/>
    <line x1="425" y1="335" x2="450" y2="338"/>
    <line x1="425" y1="340" x2="448" y2="342"/>
    <line x1="425" y1="345" x2="445" y2="350"/>
  </g>
  
  <!-- Collar -->
  <rect x="378" y="358" width="44" height="8" fill="#D4C8B8" rx="2"/>
  <rect x="393" y="360" width="8" height="4" fill="#C0C0C0" rx="1"/>
  
  <!-- Remote on desk left -->
  <rect x="100" y="480" width="22" height="55" rx="3" fill="#2d2d2d"/>
  <circle cx="111" cy="492" r="3.5" fill="#555"/>
  <circle cx="111" cy="504" r="3" fill="#777"/>
  <circle cx="111" cy="516" r="3" fill="#777"/>
  
  <!-- Paper on desk right -->
  <rect x="580" y="420" width="95" height="120" fill="#ffffff"/>
  <line x1="600" y1="450" x2="655" y2="450" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="600" y1="465" x2="645" y2="465" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="600" y1="480" x2="660" y2="480" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="600" y1="495" x2="650" y2="495" stroke="#d0d0d0" stroke-width="1"/>
</svg>