<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7a8e6a;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#5a6a5a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="catGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf0d0;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#deb887;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c4a562;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="deskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d6ba92;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b49462;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="macbookGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#d8d8d8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c0c0c0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d0d0d0;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.35"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <radialGradient id="windowGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff8e8;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#e8d5b7;stop-opacity:0.3"/>
    </radialGradient>
  </defs>
  
  <!-- Wall -->
  <rect width="800" height="400" fill="url(#wallGrad)"/>
  
  <!-- Window glow -->
  <ellipse cx="400" cy="75" rx="180" ry="80" fill="url(#windowGlow)"/>
  
  <!-- Window with panes -->
  <rect x="200" y="0" width="400" height="150" fill="#e8d5b7" opacity="0.6"/>
  <rect x="210" y="10" width="380" height="130" fill="none" stroke="#7a6b5a" stroke-width="4"/>
  <line x1="400" y1="10" x2="400" y2="140" stroke="#7a6b5a" stroke-width="3"/>
  <line x1="210" y1="80" x2="590" y2="80" stroke="#7a6b5a" stroke-width="3"/>
  
  <!-- Desk -->
  <rect x="0" y="400" width="800" height="200" fill="url(#deskGrad)"/>
  <rect x="0" y="400" width="800" height="10" fill="#8a6a4a"/>
  <ellipse cx="400" cy="400" rx="350" ry="8" fill="#000" opacity="0.12"/>
  
  <!-- Papers on left -->
  <g transform="rotate(-5 100 485)">
    <rect x="50" y="420" width="100" height="130" fill="#fafafa" stroke="#ddd" stroke-width="0.5" filter="url(#softShadow)"/>
    <line x1="65" y1="440" x2="145" y2="440" stroke="#d0d0d0" stroke-width="1"/>
    <line x1="65" y1="458" x2="145" y2="458" stroke="#d0d0d0" stroke-width="1"/>
    <line x1="65" y1="476" x2="145" y2="476" stroke="#d0d0d0" stroke-width="1"/>
    <line x1="65" y1="494" x2="145" y2="494" stroke="#d0d0d0" stroke-width="1"/>
    <rect x="70" y="430" width="60" height="8" fill="#e0e0e0" rx="1"/>
    <rect x="70" y="445" width="45" height="5" fill="#d5d5d5" rx="1"/>
  </g>
  <rect x="70" y="455" width="90" height="110" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="0.5" transform="rotate(-8 115 510)" opacity="0.92"/>
  
  <!-- Orange cable -->
  <path d="M 320,440 Q 280,450 250,480 Q 220,510 200,540" stroke="#ff7f00" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M 320,440 Q 280,450 250,480 Q 220,510 200,540" stroke="#ffaa44" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4" stroke-dasharray="3,2"/>
  <ellipse cx="200" cy="540" rx="10" ry="5" fill="#cc6600" stroke="#994400" stroke-width="1"/>
  
  <!-- MacBook -->
  <rect x="320" y="340" width="160" height="100" rx="5" fill="url(#macbookGrad)" stroke="#666" stroke-width="2" filter="url(#shadow)"/>
  <rect x="325" y="345" width="150" height="80" rx="2" fill="#0a0a0a"/>
  <rect x="328" y="348" width="144" height="74" rx="1" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="400" y="418" text-anchor="middle" fill="#ff5500" font-size="20" font-family="Arial" font-weight="bold"></text>
  
  <!-- Keyboard below MacBook -->
  <rect x="340" y="445" width="120" height="25" rx="3" fill="#2a2a2a" filter="url(#softShadow)"/>
  <!-- Keys -->
  <g fill="url(#keyGrad)">
    <rect x="345" y="450" width="8" height="15" rx="1" opacity="0.9"/>
    <rect x="356" y="450" width="8" height="15" rx="1" opacity="0.9"/>
    <rect x="367" y="450" width="8" height="15" rx="1" opacity="0.9"/>
    <rect x="378" y="450" width="8" height="15" rx="1" opacity="0.9"/>
    <rect x="389" y="450" width="8" height="15" rx="1" opacity="0.9"/>
    <rect x="400" y="450" width="8" height="15" rx="1" opacity="0.9"/>
    <rect x="411" y="450" width="8" height="15" rx="1" opacity="0.9"/>
    <rect x="422" y="450" width="8" height="15" rx="1" opacity="0.9"/>
    <rect x="433" y="450" width="8" height="15" rx="1" opacity="0.9"/>
    <rect x="444" y="450" width="8" height="15" rx="1" opacity="0.9"/>
  </g>
  
  <!-- Monitor -->
  <rect x="250" y="250" width="300" height="180" fill="#151515" stroke="#252525" stroke-width="5" filter="url(#shadow)"/>
  <rect x="260" y="260" width="280" height="160" fill="#030303"/>
  <rect x="380" y="430" width="40" height="18" fill="#151515"/>
  
  <!-- Cat body -->
  <path d="M 315,455 Q 315,525 400,525 Q 485,525 485,455 Q 485,395 452,382 L 400,402 L 348,382 Q 315,395 315,455 Z" fill="url(#catGrad)" filter="url(#shadow)"/>
  
  <!-- Tabby stripes -->
  <path d="M 335,445 Q 345,465 335,485" stroke="#b59055" stroke-width="4" fill="none" opacity="0.5"/>
  <path d="M 355,448 Q 365,468 355,488" stroke="#b59055" stroke-width="4" fill="none" opacity="0.45"/>
  <path d="M 375,450 Q 385,470 375,490" stroke="#b59055" stroke-width="3" fill="none" opacity="0.4"/>
  <path d="M 455,448 Q 465,468 455,488" stroke="#b59055" stroke-width="4" fill="none" opacity="0.45"/>
  <path d="M 475,445 Q 485,465 475,485" stroke="#b59055" stroke-width="4" fill="none" opacity="0.5"/>
  
  <!-- Cat head -->
  <ellipse cx="400" cy="380" rx="58" ry="50" fill="url(#catGrad)"/>
  
  <!-- Forehead M -->
  <path d="M 392,352 L 388,368" stroke="#b59055" stroke-width="3" fill="none" opacity="0.5"/>
  <path d="M 408,352 L 412,368" stroke="#b59055" stroke-width="3" fill="none" opacity="0.5"/>
  <path d="M 392,352 L 408,355 L 412,368" stroke="#b59055" stroke-width="2" fill="none" opacity="0.4"/>
  
  <!-- Ears -->
  <polygon points="358,342 348,308 388,342" fill="url(#catGrad)" stroke="#c4a562" stroke-width="1"/>
  <polygon points="442,342 452,308 412,342" fill="url(#catGrad)" stroke="#c4a562" stroke-width="1"/>
  <polygon points="362,340 354,315 382,340" fill="#ffc0cb"/>
  <polygon points="438,340 446,315 418,340" fill="#ffc0cb"/>
  <path d="M 365,338 L 378,342" stroke="#b59055" stroke-width="2" opacity="0.5"/>
  <path d="M 435,338 L 422,342" stroke="#b59055" stroke-width="2" opacity="0.5"/>
  
  <!-- Eyes -->
  <ellipse cx="383" cy="373" rx="6" ry="10" fill="#7cbf5a"/>
  <ellipse cx="417" cy="373" rx="6" ry="10" fill="#7cbf5a"/>
  <ellipse cx="383" cy="373" rx="3" ry="8" fill="#050505"/>
  <ellipse cx="417" cy="373" rx="3" ry="8" fill="#050505"/>
  <circle cx="381" cy="370" r="2.5" fill="#fff" opacity="0.9"/>
  <circle cx="415" cy="370" r="2.5" fill="#fff" opacity="0.9"/>
  <ellipse cx="383" cy="373" rx="6" ry="10" fill="none" stroke="#2a4a1a" stroke-width="1" opacity="0.4"/>
  <ellipse cx="417" cy="373" rx="6" ry="10" fill="none" stroke="#2a4a1a" stroke-width="1" opacity="0.4"/>
  
  <!-- Serious eyebrows -->
  <path d="M 375,362 L 388,365" stroke="#b59055" stroke-width="2" opacity="0.6"/>
  <path d="M 425,362 L 412,365" stroke="#b59055" stroke-width="2" opacity="0.6"/>
  
  <!-- Nose and mouth -->
  <polygon points="395,383 405,383 400,393" fill="#ffb6c1"/>
  <line x1="400" y1="393" x2="400" y2="402" stroke="#454545" stroke-width="1.5"/>
  <path d="M 395,395 Q 388,392 383,388" stroke="#555555" stroke-width="1.2" fill="none"/>
  <path d="M 405,395 Q 412,392 417,388" stroke="#555555" stroke-width="1.2" fill="none"/>
  
  <!-- Cheek stripes -->
  <path d="M 372,375 L 368,370" stroke="#b59055" stroke-width="2" opacity="0.5"/>
  <path d="M 372,380 L 368,375" stroke="#b59055" stroke-width="2" opacity="0.5"/>
  <path d="M 428,375 L 432,370" stroke="#b59055" stroke-width="2" opacity="0.5"/>
  <path d="M 428,380 L 432,375" stroke="#b59055" stroke-width="2" opacity="0.5"/>
  
  <!-- Collar -->
  <ellipse cx="400" cy="412" rx="48" ry="14" fill="#5a5a5a"/>
  <ellipse cx="400" cy="412" rx="45" ry="11" fill="#4a4a4a"/>
  <rect x="395" y="408" width="10" height="8" fill="#d4af37" rx="1"/>
  <circle cx="400" cy="412" r="2" fill="#f0e0a0"/>
  
  <!-- White chest -->
  <ellipse cx="400" cy="425" rx="28" ry="32" fill="#fff" opacity="0.95"/>
  <ellipse cx="400" cy="425" rx="20" ry="24" fill="#fafafa"/>
  
  <!-- Paws -->
  <ellipse cx="350" cy="520" rx="15" ry="10" fill="#fff"/>
  <ellipse cx="450" cy="520" rx="15" ry="10" fill="#fff"/>
  <path d="M 345,515 L 350,512 L 355,515" stroke="#e0e0e0" stroke-width="1" fill="none"/>
  <path d="M 445,515 L 450,512 L 455,515" stroke="#e0e0e0" stroke-width="1" fill="none"/>
  
  <!-- Tail -->
  <path d="M 485,462 Q 525,482 525,505 Q 525,528 500,538" stroke="url(#catGrad)" stroke-width="20" fill="none" stroke-linecap="round"/>
  <path d="M 490,468 L 500,478" stroke="#b59055" stroke-width="4" opacity="0.5"/>
  <path d="M 505,492 L 515,502" stroke="#b59055" stroke-width="4" opacity="0.5"/>
  <path d="M 515,515 L 522,525" stroke="#b59055" stroke-width="4" opacity="0.5"/>
  
  <!-- Whiskers -->
  <line x1="368" y1="378" x2="338" y2="373" stroke="#aaa" stroke-width="1.2" opacity="0.6"/>
  <line x1="368" y1="383" x2="338" y2="383" stroke="#aaa" stroke-width="1.2" opacity="0.6"/>
  <line x1="368" y1="388" x2="338" y2="393" stroke="#aaa" stroke-width="1.2" opacity="0.6"/>
  <line x1="432" y1="378" x2="462" y2="373" stroke="#aaa" stroke-width="1.2" opacity="0.6"/>
  <line x1="432" y1="383" x2="462" y2="383" stroke="#aaa" stroke-width="1.2" opacity="0.6"/>
  <line x1="432" y1="388" x2="462" y2="393" stroke="#aaa" stroke-width="1.2" opacity="0.6"/>
  
  <!-- Shadow under cat -->
  <ellipse cx="400" cy="530" rx="90" ry="15" fill="#000" opacity="0.2"/>
  
  <!-- Light reflection on cat head -->
  <ellipse cx="400" cy="365" rx="25" ry="15" fill="#fff" opacity="0.1"/>
</svg>