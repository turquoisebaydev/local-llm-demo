<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Wood grain -->
    <pattern id="woodGrain" x="0" y="0" width="30" height="10" patternUnits="userSpaceOnUse">
      <path d="M 0 5 Q 15 2 30 5" stroke="#c4a574" stroke-width="0.5" fill="none"/>
    </pattern>
    <!-- Neutral bronze-grey laptop gradient -->
    <linearGradient id="laptopGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4a992"/>
      <stop offset="50%" style="stop-color:#a89588"/>
      <stop offset="100%" style="stop-color:#95867a"/>
    </linearGradient>
  </defs>
  
  <!-- Background black monitor with thin bezel -->
  <rect width="800" height="400" fill="#000000"/>
  <rect x="160" y="110" width="480" height="280" fill="#050505" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="628" cy="385" r="3" fill="#222"/>
  
  <!-- Desk with wood grain -->
  <rect y="370" width="800" height="230" fill="#deb887"/>
  <rect y="370" width="800" height="230" fill="url(#woodGrain)"/>
  
  <!-- Laptop body (neutral bronze-grey) -->
  <rect x="175" y="305" width="450" height="155" fill="url(#laptopGrad)" rx="5"/>
  <rect x="175" y="305" width="450" height="8" fill="#d4c4b8" rx="2"/>
  
  <!-- Laptop screen (thin bezel, white content like browser/doc) -->
  <rect x="190" y="215" width="420" height="95" fill="#1a1a1a"/>
  <rect x="200" y="225" width="400" height="75" fill="#f5f5f5"/>
  <!-- Browser window hint -->
  <rect x="210" y="235" width="380" height="12" fill="#e0e0e0"/>
  <circle cx="220" cy="241" r="3" fill="#ff5f56"/>
  <circle cx="232" cy="241" r="3" fill="#ffbd2e"/>
  <circle cx="244" cy="241" r="3" fill="#27c93f"/>
  <!-- Content lines -->
  <rect x="210" y="255" width="200" height="3" fill="#ddd"/>
  <rect x="210" y="263" width="180" height="3" fill="#ddd"/>
  <rect x="210" y="271" width="190" height="3" fill="#ddd"/>
  <rect x="210" y="285" width="150" height="3" fill="#ddd"/>
  <rect x="210" y="293" width="160" height="3" fill="#ddd"/>
  
  <!-- Keyboard -->
  <rect x="185" y="330" width="430" height="48" fill="#222" rx="3"/>
  <g fill="#333">
    <rect x="195" y="335" width="18" height="9" rx="1.5"/>
    <rect x="220" y="335" width="18" height="9" rx="1.5"/>
    <rect x="245" y="335" width="18" height="9" rx="1.5"/>
    <rect x="270" y="335" width="18" height="9" rx="1.5"/>
    <rect x="295" y="335" width="18" height="9" rx="1.5"/>
    <rect x="320" y="335" width="18" height="9" rx="1.5"/>
    <rect x="345" y="335" width="18" height="9" rx="1.5"/>
    <rect x="370" y="335" width="18" height="9" rx="1.5"/>
    <rect x="395" y="335" width="18" height="9" rx="1.5"/>
    <rect x="420" y="335" width="18" height="9" rx="1.5"/>
    <rect x="445" y="335" width="18" height="9" rx="1.5"/>
    <rect x="470" y="335" width="18" height="9" rx="1.5"/>
  </g>
  
  <!-- Trackpad -->
  <rect x="350" y="390" width="100" height="42" fill="#c0b0a8" rx="3"/>
  
  <!-- Orange cable with connector -->
  <path d="M 180 355 Q 145 385 125 420 Q 108 455 92 445" stroke="#ff6600" stroke-width="5" fill="none" stroke-linecap="round"/>
  <rect x="85" y="442" width="12" height="8" fill="#e8e8e8" rx="1"/>
  
  <!-- Papers with text blocks -->
  <rect x="575" y="405" width="100" height="80" fill="#fafafa" transform="rotate(-3 575 405)"/>
  <rect x="585" y="420" width="75" height="4" fill="#c0c0c0"/>
  <rect x="585" y="430" width="65" height="3" fill="#c0c0c0"/>
  <rect x="585" y="440" width="70" height="3" fill="#c0c0c0"/>
  <rect x="585" y="455" width="55" height="3" fill="#c0c0c0"/>
  <rect x="585" y="465" width="60" height="3" fill="#c0c0c0"/>
  
  <!-- Remote with button cluster -->
  <rect x="115" y="420" width="40" height="70" fill="#1a1a1a" rx="3"/>
  <circle cx="125" cy="438" r="4" fill="#333"/>
  <circle cx="135" cy="438" r="4" fill="#333"/>
  <circle cx="120" cy="450" r="4" fill="#333"/>
  <circle cx="135" cy="450" r="5" fill="#333"/>
  <circle cx="150" cy="450" r="4" fill="#333"/>
  <rect x="123" y="465" width="14" height="14" fill="#333" rx="2"/>
  
  <!-- Devon Rex Cat with jagged/wavy outline -->
  <!-- Body (jagged outline suggesting crimped fur, kinked spine) -->
  <path d="M 345 375 
           Q 335 385 340 400 
           Q 338 420 355 435 
           L 400 442 
           L 445 435 
           Q 462 420 460 400 
           Q 465 385 455 375 
           Q 440 370 420 372 
           Q 400 368 380 372 
           Q 360 370 345 375 Z" 
        fill="#ffffff" stroke="#e8e8e8" stroke-width="0.5"/>
  
  <!-- Mottled grey patches (ticked, not smooth) -->
  <path d="M 360 378 Q 370 372 385 375 Q 395 372 405 375 Q 420 372 435 378 Q 425 385 400 387 Q 375 385 360 378" fill="#a8a8a8" opacity="0.7"/>
  <!-- Ticked texture -->
  <circle cx="370" cy="380" r="4" fill="#999" opacity="0.5"/>
  <circle cx="385" cy="375" r="3" fill="#888" opacity="0.4"/>
  <circle cx="400" cy="378" r="4" fill="#999" opacity="0.5"/>
  <circle cx="415" cy="375" r="3" fill="#888" opacity="0.4"/>
  <circle cx="430" cy="380" r="4" fill="#999" opacity="0.5"/>
  
  <!-- Head (angular, alien-like, heart-shaped) -->
  <path d="M 362 288 
           Q 358 270 375 262 
           L 400 258 
           L 425 262 
           Q 442 270 438 288 
           Q 425 310 400 315 
           Q 375 310 362 288 Z" 
        fill="#ffffff"/>
  
  <!-- Enormous ears (wide base, sharp tips, pointing up) -->
  <path d="M 370 262 Q 355 210 378 215 Q 385 245 382 265 Q 370 260 370 262 Z" fill="#ffffff"/>
  <path d="M 373 258 Q 362 225 376 228 Q 380 250 378 260" fill="#ffc0cb" opacity="0.7"/>
  <path d="M 430 262 Q 445 210 422 215 Q 415 245 418 265 Q 430 260 430 262 Z" fill="#ffffff"/>
  <path d="M 427 258 Q 438 225 424 228 Q 420 250 422 260" fill="#ffc0cb" opacity="0.7"/>
  
  <!-- Huge bulging round yellow-green eyes -->
  <circle cx="382" cy="295" r="12" fill="#9acd32"/>
  <circle cx="418" cy="295" r="12" fill="#9acd32"/>
  <!-- Wide vertical slit pupils -->
  <ellipse cx="382" cy="294" rx="2" ry="9" fill="#050505"/>
  <ellipse cx="418" cy="294" rx="2" ry="9" fill="#050505"/>
  <!-- Big shine -->
  <ellipse cx="378" cy="289" rx="4" ry="3" fill="#ffffff" opacity="0.85"/>
  <ellipse cx="414" cy="289" rx="4" ry="3" fill="#ffffff" opacity="0.85"/>
  
  <!-- Short pointed muzzle, high nose, whisker pads -->
  <ellipse cx="400" cy="305" rx="4" ry="3" fill="#e88e8e"/>
  <path d="M 396 308 Q 392 314 390 311" stroke="#555" stroke-width="1" fill="none"/>
  <path d="M 404 308 Q 408 314 410 311" stroke="#555" stroke-width="1" fill="none"/>
  <ellipse cx="388" cy="310" rx="6" ry="4" fill="#f0f0f0" opacity="0.6"/>
  <ellipse cx="412" cy="310" rx="6" ry="4" fill="#f0f0f0" opacity="0.6"/>
  
  <!-- Thick grey leather collar with metal buckle and stitching -->
  <path d="M 368 318 Q 400 328 432 318 Q 430 330 400 335 Q 370 330 368 318 Z" fill="#808080"/>
  <!-- Stitching -->
  <line x1="378" y1="320" x2="378" y2="332" stroke="#6a6a6a" stroke-width="0.8"/>
  <line x1="390" y1="321" x2="390" y2="334" stroke="#6a6a6a" stroke-width="0.8"/>
  <line x1="400" y1="322" x2="400" y2="335" stroke="#6a6a6a" stroke-width="0.8"/>
  <line x1="410" y1="321" x2="410" y2="334" stroke="#6a6a6a" stroke-width="0.8"/>
  <line x1="422" y1="320" x2="422" y2="332" stroke="#6a6a6a" stroke-width="0.8"/>
  <!-- Metal buckle (gunmetal) -->
  <rect x="394" y="324" width="12" height="9" fill="#4a5568" rx="1"/>
  
  <!-- Thin bowed front legs -->
  <path d="M 355 408 Q 350 425 352 438" stroke="#ffffff" stroke-width="11" fill="none" stroke-linecap="round"/>
  <path d="M 445 408 Q 450 425 448 438" stroke="#ffffff" stroke-width="11" fill="none" stroke-linecap="round"/>
  
  <!-- Large prominent paws with separated toes -->
  <ellipse cx="352" cy="440" rx="16" ry="12" fill="#ffffff"/>
  <ellipse cx="448" cy="440" rx="16" ry="12" fill="#ffffff"/>
  <!-- Separated toe beans -->
  <ellipse cx="344" cy="442" rx="5" ry="4" fill="#ffb6c1" opacity="0.7"/>
  <ellipse cx="352" cy="444" rx="5" ry="4" fill="#ffb6c1" opacity="0.7"/>
  <ellipse cx="360" cy="442" rx="5" ry="4" fill="#ffb6c1" opacity="0.7"/>
  <ellipse cx="440" cy="442" rx="5" ry="4" fill="#ffb6c1" opacity="0.7"/>
  <ellipse cx="448" cy="444" rx="5" ry="4" fill="#ffb6c1" opacity="0.7"/>
  <ellipse cx="456" cy="442" rx="5" ry="4" fill="#ffb6c1" opacity="0.7"/>
  
  <!-- Long thin whippy tail with fine stripes -->
  <path d="M 455 390 Q 495 385 515 410 Q 528 435 510 455 Q 475 465 440 460" stroke="#ffffff" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- Fine dark stripes -->
  <path d="M 478 387 Q 490 385 500 392" stroke="#252525" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M 508 402 Q 518 415 520 428" stroke="#252525" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M 515 442 Q 500 452 482 457" stroke="#252525" stroke-width="9" fill="none" stroke-linecap="round"/>
</svg>
