<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="furGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5deb3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ede0c8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4c4a0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="deskGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8894a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="laptopGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c8c8c8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#989898;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#2a5a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a2a;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="windowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b8b8b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b6b6b;stop-opacity:1" />
    </linearGradient>
    <pattern id="furTexture" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 2 10 Q 5 8 8 10 M 12 12 Q 15 10 18 12 M 4 15 Q 7 13 10 15" stroke="#d4c4a0" stroke-width="1" fill="none" opacity="0.3"/>
    </pattern>
    <radialGradient id="ambientGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#2a4a3a;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4a4a4a;stop-opacity:0" />
    </radialGradient>
  </defs>
  
