    <text x="280" y="235">    while True:</text>
    <text x="290" y="250">        type_code()</text>
    <text x="290" y="265">        judge_humans()</text>
    <text x="290" y="280">        nap_briefly()</text>
    <text x="270" y="300">cat_works_hard()</text>
