<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a5a5a"/>
      <stop offset="100%" style="stop-color:#3a3a3a"/>
    </linearGradient>
    <linearGradient id="deskGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b89474"/>
      <stop offset="50%" style="stop-color:#d4b494"/>
      <stop offset="100%" style="stop-color:#b89474"/>
    </linearGradient>
    <linearGradient id="catGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2c49c"/>
      <stop offset="100%" style="stop-color:#c2a47c"/>
    </linearGradient>
    <linearGradient id="macGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d0d0d0"/>
      <stop offset="100%" style="stop-color:#a0a0a0"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a6e"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="collarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#595959"/>
      <stop offset="50%" style="stop-color:#797979"/>
      <stop offset="100%" style="stop-color:#595959"/>
    </linearGradient>
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="2" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="70%" style="stop-color:#9acd32"/>
      <stop offset="100%" style="stop-color:#6d8b12"/>
    </radialGradient>
  </defs>
  
  <!-- Wall -->
  <rect width="800" height="600" fill="url(#wallGrad)"/>
  <!-- Window -->
  <rect x="200" y="0" width="400" height="150" fill="#7b7b7b"/>
  <rect x="220" y="20" width="120" height="100" fill="#9b9b9b" opacity="0.5"/>
  <rect x="460" y="20" width="120" height="100" fill="#9b9b9b" opacity="0.5"/>
  <rect x="200" y="0" width="400" height="150" fill="none" stroke="#555" stroke-width="3"/>
  <line x1="400" y1="0" x2="400" y2="150" stroke="#555" stroke-width="3"/>
  <line x1="200" y1="75" x2="600" y2="75" stroke="#555" stroke-width="2"/>
  
  <!-- Desk -->
  <rect x="0" y="400" width="800" height="200" fill="url(#deskGrad)"/>
  <rect x="0" y="400" width="800" height="5" fill="#8b7355"/>
  <!-- Wood grain -->
  <line x1="100" y1="450" x2="150" y2="520" stroke="#8b7355" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="480" x2="680" y2="550" stroke="#8b7355" stroke-width="1" opacity="0.3"/>
  <line x1="700" y1="420" x2="760" y2="480" stroke="#8b7355" stroke-width="1" opacity="0.3"/>
  <line x1="300" y1="460" x2="380" y2="520" stroke="#8b7355" stroke-width="1" opacity="0.2"/>
  
  <!-- MacBook with highlights -->
  <g filter="url(#softShadow)">
    <!-- Main body -->
    <rect x="320" y="320" width="160" height="100" fill="url(#macGrad)"/>
    <!-- Screen -->
    <rect x="330" y="330" width="140" height="80" fill="url(#screenGlow)"/>
    <!-- Code hints -->
    <rect x="345" y="345" width="20" height="3" fill="#4a6" opacity="0.4"/>
    <rect x="345" y="352" width="40" height="3" fill="#68a" opacity="0.4"/>
    <rect x="345" y="359" width="30" height="3" fill="#a64" opacity="0.4"/>
    <rect x="345" y="366" width="50" height="3" fill="#6a8" opacity="0.4"/>
    <rect x="345" y="373" width="35" height="3" fill="#86a" opacity="0.4"/>
    <rect x="345" y="380" width="45" height="3" fill="#68a" opacity="0.4"/>
    <!-- Screen reflection -->
    <rect x="350" y="340" width="80" height="20" fill="#fff" opacity="0.05"/>
    <!-- Apple logo -->
    <path d="M400 350 Q405 348 410 350 Q405 355 400 350" fill="#fff" opacity="0.8"/>
    <!-- Keyboard area -->
    <rect x="330" y="415" width="140" height="5" fill="#666" opacity="0.5"/>
    <rect x="335" y="422" width="130" height="3" fill="#666" opacity="0.5"/>
    <!-- Trackpad -->
    <rect x="360" y="430" width="80" height="5" fill="#888" opacity="0.6"/>
    <!-- Body highlight -->
    <rect x="325" y="325" width="150" height="2" fill="#fff" opacity="0.3"/>
  </g>
  
  <!-- Monitor -->
  <g filter="url(#dropShadow)">
    <rect x="350" y="200" width="100" height="80" fill="#1a1a1a"/>
    <rect x="355" y="205" width="90" height="70" fill="#2a2a3e" opacity="0.5"/>
    <rect x="380" y="280" width="40" height="20" fill="#333"/>
  </g>
  
  <!-- Orange cable -->
  <path d="M200 400 Q250 450 320 420" stroke="#ff6600" stroke-width="4" fill="none" stroke-linecap="round"/>
  <rect x="195" y="398" width="10" height="6" fill="#333"/>
  <path d="M200 402 Q250 452 320 422" stroke="#000" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.2"/>
  
  <!-- Papers -->
  <g filter="url(#dropShadow)">
    <rect x="80" y="420" width="60" height="80" fill="#fff" opacity="0.95"/>
    <rect x="100" y="430" width="50" height="70" fill="#f5f5f5" opacity="0.9"/>
    <line x1="105" y1="445" x2="145" y2="445" stroke="#ccc" stroke-width="2"/>
    <line x1="105" y1="455" x2="145" y2="455" stroke="#ccc" stroke-width="2"/>
    <line x1="105" y1="465" x2="145" y2="465" stroke="#ccc" stroke-width="2"/>
    <line x1="105" y1="475" x2="145" y2="475" stroke="#ccc" stroke-width="2"/>
    <line x1="105" y1="485" x2="145" y2="485" stroke="#ccc" stroke-width="2"/>
  </g>
  
  <!-- Cat tail -->
  <g filter="url(#dropShadow)">
    <path d="M350 480 Q320 500 340 530 Q350 540 360 530 Q380 510 390 490" stroke="url(#catGrad)" stroke-width="15" fill="none" stroke-linecap="round"/>
    <path d="M355 500 Q340 510 345 520" stroke="#8b7355" stroke-width="3" fill="none"/>
    <path d="M365 515 Q355 525 360 530" stroke="#8b7355" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Cat body -->
  <ellipse cx="400" cy="450" rx="60" ry="80" fill="url(#catGrad)" filter="url(#softShadow)"/>
  <!-- Body stripes -->
  <path d="M380 430 Q400 425 420 430" stroke="#8b7355" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M375 450 Q400 445 425 450" stroke="#8b7355" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M380 470 Q400 465 420 470" stroke="#8b7355" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M385 490 Q400 485 415 490" stroke="#8b7355" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Fur texture -->
  <path d="M370 440 Q375 435 380 440" stroke="#b89474" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M420 440 Q425 435 430 440" stroke="#b89474" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M365 460 Q370 455 375 460" stroke="#b89474" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M425 460 Q430 455 435 460" stroke="#b89474" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Body shadow -->
  <ellipse cx="390" cy="460" rx="40" ry="60" fill="#000" opacity="0.05"/>
  
  <!-- Front legs -->
  <rect x="378" y="470" width="18" height="50" fill="url(#catGrad)"/>
  <rect x="404" y="470" width="18" height="50" fill="url(#catGrad)"/>
  <path d="M380 480 L390 485" stroke="#8b7355" stroke-width="2" opacity="0.4"/>
  <path d="M406 480 L416 485" stroke="#8b7355" stroke-width="2" opacity="0.4"/>
  
  <!-- White chest -->
  <ellipse cx="400" cy="440" rx="30" ry="40" fill="#fff8e7"/>
  
  <!-- Cat head -->
  <circle cx="400" cy="370" r="50" fill="url(#catGrad)" filter="url(#dropShadow)"/>
  <!-- Head stripes -->
  <path d="M385 340 Q400 335 415 340" stroke="#8b7355" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M380 350 Q400 345 420 350" stroke="#8b7355" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M375 360 Q390 355 400 358" stroke="#8b7355" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M425 360 Q410 355 400 358" stroke="#8b7355" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Cheek fur -->
  <path d="M370 390 Q365 395 370 400" stroke="#b89474" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M430 390 Q435 395 430 400" stroke="#b89474" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- Head highlight -->
  <ellipse cx="400" cy="355" rx="35" ry="20" fill="#fff" opacity="0.08"/>
  
  <!-- Left ear -->
  <polygon points="360,330 370,300 390,325" fill="url(#catGrad)"/>
  <polygon points="365,325 370,310 380,325" fill="#ffb6c1"/>
  <path d="M368 322 L372 315 L378 323" stroke="#b89474" stroke-width="1" fill="none"/>
  
  <!-- Right ear -->
  <polygon points="410,325 420,300 440,330" fill="url(#catGrad)"/>
  <polygon points="420,325 430,310 435,325" fill="#ffb6c1"/>
  <path d="M432 322 L428 315 L422 323" stroke="#b89474" stroke-width="1" fill="none"/>
  
  <!-- Eyes -->
  <circle cx="385" cy="365" r="9" fill="url(#eyeGlow)"/>
  <circle cx="415" cy="365" r="9" fill="url(#eyeGlow)"/>
  <circle cx="387" cy="362" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="417" cy="362" r="2" fill="#fff" opacity="0.8"/>
  <ellipse cx="385" cy="365" rx="2" ry="10" fill="#000"/>
  <ellipse cx="415" cy="365" rx="2" ry="10" fill="#000"/>
  <!-- Brows -->
  <path d="M378 352 Q385 348 392 352" stroke="#8b7355" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M408 352 Q415 348 422 352" stroke="#8b7355" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Nose -->
  <polygon points="395,375 405,375 400,382" fill="#ffb6c1"/>
  <!-- Mouth -->
  <path d="M400 382 Q395 390 390 385" stroke="#444" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M400 382 Q405 390 410 385" stroke="#444" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M392 387 L408 387" stroke="#444" stroke-width="1" fill="none" opacity="0.6"/>
  
  <!-- Whiskers -->
  <line x1="370" y1="380" x2="340" y2="375" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="370" y1="385" x2="340" y2="385" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="370" y1="390" x2="340" y2="395" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="430" y1="380" x2="460" y2="375" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="430" y1="385" x2="460" y2="385" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="430" y1="390" x2="460" y2="395" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Collar -->
  <ellipse cx="400" cy="405" rx="50" ry="12" fill="url(#collarGrad)"/>
  <line x1="360" y1="400" x2="440" y2="400" stroke="#4a4a4a" stroke-width="1" opacity="0.6"/>
  <circle cx="400" cy="415" r="5" fill="#ffd700"/>
  <circle cx="400" cy="415" r="3" fill="#ffed4a"/>
  <circle cx="400" cy="415" r="1" fill="#b8960c"/>
  
  <!-- Paws -->
  <ellipse cx="385" cy="520" rx="12" ry="8" fill="#fff8e7"/>
  <ellipse cx="415" cy="520" rx="12" ry="8" fill="#fff8e7"/>
  <ellipse cx="385" cy="523" rx="6" ry="4" fill="#ffb6c1" opacity="0.6"/>
  <ellipse cx="415" cy="523" rx="6" ry="4" fill="#ffb6c1" opacity="0.6"/>
  
  <!-- Desk shadow -->
  <ellipse cx="400" cy="530" rx="70" ry="15" fill="#000" opacity="0.15"/>
</svg>