<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background monitor - dark with window reflection -->
  <defs>
    <linearGradient id="monitorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#222222"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="woodGrain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C49A65"/>
      <stop offset="30%" stop-color="#B88E55"/>
      <stop offset="60%" stop-color="#C49A65"/>
      <stop offset="100%" stop-color="#B88E55"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Window reflection at top of monitor -->
  <rect x="200" y="30" width="400" height="80" fill="#ffffff" opacity="0.08"/>
  <line x1="200" y1="50" x2="600" y2="50" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  
  <!-- Desk surface - light wood grain -->
  <rect x="0" y="520" width="800" height="80" fill="url(#woodGrain)"/>
  
  <!-- Laptop base - silver aluminum with shadow -->
  <rect x="180" y="340" width="440" height="260" rx="10" fill="#C0C0C0"/>
  <rect x="180" y="340" width="440" height="260" rx="10" fill="#000000" opacity="0.15"/>
  <rect x="190" y="350" width="420" height="240" rx="5" fill="#A9A9A9"/>
  
  <!-- Laptop keyboard - black chiclet keys -->
  <rect x="200" y="460" width="400" height="120" fill="#000000"/>
  <rect x="210" y="470" width="380" height="100" fill="#0a0a0a"/>
  <!-- Row 1 keys -->
  <rect x="215" y="475" width="18" height="12" fill="#1a1a1a" rx="1"/>
  <rect x="240" y="475" width="18" height="12" fill="#1a1a1a" rx="1"/>
  <rect x="265" y="475" width="18" height="12" fill="#1a1a1a" rx="1"/>
  <rect x="290" y="475" width="18" height="12" fill="#1a1a1a" rx="1"/>
  <rect x="315" y="475" width="18" height="12" fill="#1a1a1a" rx="1"/>
  <rect x="340" y="475" width="18" height="12" fill="#1a1a1a" rx="1"/>
  <rect x="365" y="475" width="18" height="12" fill="#1a1a1a" rx="1"/>
  <rect x="390" y="475" width="18" height="12" fill="#1a1a1a" rx="1"/>
  <rect x="415" y="475" width="18" height="12" fill="#1a1a1a" rx="1"/>
  <rect x="440" y="475" width="18" height="12" fill="#1a1a1a" rx="1"/>
  <!-- Row 2 keys -->
  <rect x="215" y="500" width="18" height="12" fill="#1a1a1a" rx="1"/>
  <rect x="240" y="500" width="18" height="12" fill="#1a1a1a" rx="1"/>
  <rect x="265" y="500" width="18" height="12" fill="#1a1a1a" rx="1"/>
  <rect x="290" y="500" width="18" height="12" fill="#1a1a1a" rx="1"/>
  <rect x="315" y="500" width="18" height="12" fill="#1a1a1a" rx="1"/>
  <rect x="340" y="500" width="18" height="12" fill="#1a1a1a" rx="1"/>
  <rect x="365" y="500" width="18" height="12" fill="#1a1a1a" rx="1"/>
  <rect x="390" y="500" width="18" height="12" fill="#1a1a1a" rx="1"/>
  <rect x="415" y="500" width="18" height="12" fill="#1a1a1a" rx="1"/>
  <rect x="440" y="500" width="18" height="12" fill="#1a1a1a" rx="1"/>
  <!-- Spacebar -->
  <rect x="305" y="520" width="190" height="12" fill="#1a1a1a" rx="2"/>
  
  <!-- Trackpad - silver with soft shadow -->
  <rect x="250" y="540" width="300" height="60" rx="5" fill="#D3D3D3"/>
  <rect x="260" y="550" width="280" height="40" fill="#C0C0C0"/>
  <rect x="260" y="550" width="280" height="40" fill="#000000" opacity="0.1"/>
  
  <!-- Laptop screen -->
  <defs>
    <linearGradient id="screenGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecf0f1"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <rect x="190" y="350" width="420" height="190" fill="#1a1a1a"/>
  <rect x="200" y="360" width="400" height="170" fill="#3498db"/>
  <rect x="210" y="370" width="380" height="150" fill="url(#screenGloss)"/>
  <!-- macOS menu bar -->
  <rect x="210" y="360" width="380" height="20" fill="#2c3e50"/>
  <text x="225" y="380" text-anchor="middle" fill="#ffffff" font-size="12"> Finder Safari Mail Messages Photos</text>
  <!-- Desktop icons -->
  <circle cx="245" cy="420" r="10" fill="#3498db"/>
  <circle cx="270" cy="420" r="10" fill="#f1c40f"/>
  <circle cx="295" cy="420" r="10" fill="#9b59b6"/>
  <circle cx="320" cy="420" r="10" fill="#e74c3c"/>
  <circle cx="345" cy="420" r="10" fill="#2ecc71"/>
  <circle cx="370" cy="420" r="10" fill="#34495e"/>
  <circle cx="395" cy="420" r="10" fill="#95a5a6"/>
  <circle cx="420" cy="420" r="10" fill="#e67e22"/>
  <circle cx="445" cy="420" r="10" fill="#1abc9c"/>
  <circle cx="470" cy="420" r="10" fill="#d35400"/>
  <circle cx="495" cy="420" r="10" fill="#8e44ad"/>
  <circle cx="520" cy="420" r="10" fill="#c0392b"/>
  <circle cx="545" cy="420" r="10" fill="#27ae60"/>
  <circle cx="570" cy="420" r="10" fill="#2980b9"/>
  <!-- Open window overlay -->
  <rect x="230" y="390" width="300" height="110" rx="5" fill="#ecf0f1" opacity="0.9"/>
  <rect x="240" y="400" width="280" height="90" fill="#ffffff"/>
  <rect x="250" y="410" width="260" height="70" fill="#ecf0f1"/>
  <text x="400" y="445" text-anchor="middle" fill="#2c3e50" font-size="14">Notes - Welcome</text>
  
  <!-- Cat shadow on laptop -->
  <ellipse cx="400" cy="460" rx="70" ry="15" fill="#000000" opacity="0.15"/>
  
  <!-- Cat body - white curly fur Devon Rex -->
  <ellipse cx="400" cy="450" rx="95" ry="75" fill="#FFFFFF"/>
  <ellipse cx="400" cy="455" rx="85" ry="68" fill="#F8F8F8"/>
  <!-- Curly fur texture -->
  <path d="M 360 430 Q 370 440 380 430" stroke="#F0F0F0" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 440 430 Q 430 440 420 430" stroke="#F0F0F0" stroke-width="2" fill="none" opacity="0.5"/>
  
  <!-- Cat head - tabby pattern with curly fur -->
  <ellipse cx="400" cy="400" rx="70" ry="62" fill="#8B8B8B"/>
  <ellipse cx="400" cy="400" rx="60" ry="54" fill="#D4A574"/>
  <!-- Curly fur on head -->
  <path d="M 370 370 Q 380 380 390 370" stroke="#D0A070" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 430 370 Q 420 380 410 370" stroke="#D0A070" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Cat ears - large low-set (Devon Rex characteristic) -->
  <polygon points="355,360 375,330 392,355" fill="#D4A574"/>
  <polygon points="355,360 375,330 392,355" fill="#C19A6B"/>
  <polygon points="355,360 375,330 392,355" fill="#B88E55"/>
  <polygon points="408,360 428,330 445,355" fill="#D4A574"/>
  <polygon points="408,360 428,330 445,355" fill="#C19A6B"/>
  <polygon points="408,360 428,330 445,355" fill="#B88E55"/>
  
  <!-- Cat face - white muzzle -->
  <ellipse cx="400" cy="390" rx="48" ry="42" fill="#FFFFFF"/>
  <ellipse cx="400" cy="392" rx="42" ry="38" fill="#F5F5F5"/>
  
  <!-- Cat eyes - green-yellow with gradient and specular highlight -->
  <defs>
    <radialGradient id="eyeHighlight" cx="0" cy="0" r="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="375" cy="380" r="10" fill="#8FBC8F"/>
  <circle cx="375" cy="380" r="5" fill="#006400"/>
  <circle cx="368" cy="376" r="3" fill="url(#eyeHighlight)"/>
  <circle cx="425" cy="380" r="10" fill="#8FBC8F"/>
  <circle cx="425" cy="380" r="5" fill="#006400"/>
  <circle cx="418" cy="376" r="3" fill="url(#eyeHighlight)"/>
  
  <!-- Cat nose -->
  <ellipse cx="400" cy="398" rx="6" ry="5" fill="#FFB6C1"/>
  
  <!-- Cat mouth -->
  <path d="M 394 400 Q 400 408 406 400" stroke="#000000" stroke-width="1.5" fill="none"/>
  
  <!-- Cat cheeks -->
  <ellipse cx="365" cy="395" rx="7" ry="4" fill="#FFE4E1" opacity="0.5"/>
  <ellipse cx="435" cy="395" rx="7" ry="4" fill="#FFE4E1" opacity="0.5"/>
  
  <!-- Cat collar - beige/tan leather -->
  <ellipse cx="400" cy="400" rx="58" ry="16" fill="#E8C88F"/>
  <ellipse cx="400" cy="400" rx="54" ry="14" fill="#D4B076"/>
  <ellipse cx="400" cy="400" rx="50" ry="12" fill="#C0A060"/>
  <circle cx="400" cy="405" r="7" fill="#C0C0C0"/>
  <circle cx="400" cy="407" r="3" fill="#808080"/>
  
  <!-- Cat tail - curled around paws (loaf pose) with dark stripes -->
  <path d="M 310 490 Q 340 520 310 550" stroke="#5A5A5A" stroke-width="25" fill="none" stroke-linecap="round"/>
  <path d="M 310 490 Q 340 520 310 550" stroke="#2A2A2A" stroke-width="20" fill="none" stroke-linecap="round"/>
  <path d="M 310 490 Q 340 520 310 550" stroke="#1A1A1A" stroke-width="15" fill="none" stroke-linecap="round"/>
  
  <!-- Cat front paws -->
  <ellipse cx="355" cy="530" rx="22" ry="18" fill="#FFFFFF"/>
  <ellipse cx="445" cy="530" rx="22" ry="18" fill="#FFFFFF"/>
  
  <!-- Orange cable with metallic USB-C connector - coiled shape -->
  <path d="M 130 510 Q 150 480 170 460 Q 190 440 210 430 Q 230 420 250 420" stroke="#FF8C00" stroke-width="20" fill="none" stroke-linecap="round"/>
  <ellipse cx="250" cy="420" rx="14" ry="10" fill="#FF8C00"/>
  <circle cx="250" cy="420" r="12" fill="#C0C0C0"/>
  <circle cx="250" cy="420" r="8" fill="#A0A0A0"/>
  <circle cx="250" cy="420" r="4" fill="#606060"/>
  
  <!-- Black smartphone -->
  <rect x="90" y="490" width="35" height="70" rx="4" fill="#1a1a1a"/>
  
  <!-- Black remote control with realistic button layout -->
  <defs>
    <filter id="btnShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="110" y="460" width="65" height="100" rx="6" fill="#1a1a1a"/>
  <!-- D-pad -->
  <rect x="125" y="475" width="15" height="15" fill="#333333"/>
  <rect x="115" y="485" width="15" height="15" fill="#333333"/>
  <rect x="135" y="485" width="15" height="15" fill="#333333"/>
  <rect x="115" y="505" width="15" height="15" fill="#333333"/>
  <rect x="145" y="505" width="15" height="15" fill="#333333"/>
  <!-- Volume buttons -->
  <rect x="155" y="480" width="10" height="12" fill="#333333" filter="url(#btnShadow)"/>
  <rect x="155" y="500" width="10" height="12" fill="#333333" filter="url(#btnShadow)"/>
  <!-- Power button -->
  <rect x="155" y="520" width="10" height="12" fill="#333333" filter="url(#btnShadow)"/>
  <path d="M 160 525 L 165 530 L 160 535" stroke="#000000" stroke-width="0.5" fill="none"/>
  
  <!-- White paper note with faint handwritten text -->
  <rect x="180" y="480" width="85" height="65" fill="#FFFFFF" rx="3"/>
  <rect x="185" y="485" width="75" height="55" fill="#F8F8F8"/>
  <line x1="190" y1="490" x2="260" y2="490" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="190" y1="510" x2="250" y2="510" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="190" y1="530" x2="255" y2="530" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Faint handwritten notes -->
  <text x="195" y="498" fill="#999999" font-size="10" font-style="italic" opacity="0.6">Meeting notes</text>
  <text x="195" y="520" fill="#999999" font-size="10" font-style="italic" opacity="0.6">Friday 10am</text>
  
  <!-- Coffee mug on desk -->
  <ellipse cx="140" y="520" rx="12" ry="6" fill="#FFFFFF" opacity="0.2"/>
  <rect x="130" y="505" width="24" height="25" rx="6" fill="#FFFFFF" opacity="0.9"/>
  <ellipse cx="142" cy="505" rx="12" ry="6" fill="#FFFFFF" opacity="0.9"/>
  <line x1="135" y1="505" x2="149" y2="505" stroke="#CCCCCC" stroke-width="0.5"/>
  
  <!-- Sticky note on desk -->
  <rect x="350" y="540" width="35" height="35" fill="#FFEB3B" rx="2" transform="rotate(-5 367 557)"/>
  
  <!-- USB drive on desk -->
  <rect x="500" y="525" width="15" height="50" rx="2" fill="#444444" transform="rotate(5 507 550)"/>
  
  <!-- Reflection on desk -->
  <ellipse cx="400" cy="600" rx="75" ry="8" fill="#FFFFFF" opacity="0.12"/>
  
  <!-- Screen text overlay -->
  <text x="400" y="380" text-anchor="middle" fill="#FFFFFF" font-size="14" opacity="0.7">Finder</text>
  
</svg>