    <path d="M382 378 Q393 390 404 378" fill="none" stroke="#6a5d4a" stroke-width="3" opacity="0.7"/>
    <path d="M380 392 Q393 405 406 392" fill="none" stroke="#6a5d4a" stroke-width="3" opacity="0.7"/>
    <path d="M382 408 Q393 420 404 408" fill="none" stroke="#6a5d4a" stroke-width="3" opacity="0.7"/>
    
    <!-- Cat head -->
