    <path d="M385 240 L400 255 L415 240" fill="none" stroke="#6a5d4a" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M383 248 L400 262 L417 248" fill="none" stroke="#6a5d4a" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Ears -->
