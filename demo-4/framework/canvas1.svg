  <!-- Trackpad -->
  <rect x="338" y="503" width="124" height="78" rx="7" ry="7" fill="url(#metallicGradient)" stroke="#a08060" stroke-width="1.5" filter="url(#softShadow)"/>
  <!-- Trackpad subtle highlight -->
  <rect x="343" y="508" width="114" height="20" rx="5" fill="#fff" opacity="0.1"/>
  
  <!-- Cat - Devon Rex -->
