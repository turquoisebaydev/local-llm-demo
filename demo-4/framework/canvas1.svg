<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
    
    <!-- Fur gradient for cat body -->
    <radialGradient id="furGradient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#fafafa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f0f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </radialGradient>
    
    <!-- Tabby patch gradient -->
    <radialGradient id="tabbyGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a09080;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#8b7d6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a6d5a;stop-opacity:1" />
    </radialGradient>
    
    <!-- Eye gradient -->
    <radialGradient id="eyeGradient" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#b8e64a;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#8bc34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5d8c1e;stop-opacity:1" />
    </radialGradient>
    
    <!-- Screen glow -->
    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7bb8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9fd4;stop-opacity:1" />
    </linearGradient>
    
    <!-- Laptop metallic gradient -->
    <linearGradient id="metallicGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b896;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#c9a880;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b89466;stop-opacity:1" />
    </linearGradient>
    
    <!-- Soft shadow filter -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    
    <!-- Fur texture pattern -->
    <pattern id="furTexture" patternUnits="userSpaceOnUse" width="4" height="4">
      <path d="M0 2 Q2 0 4 2 M0 3 Q2 1 4 3" fill="none" stroke="#ccc" stroke-width="0.3" opacity="0.4"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient)"/>
  
  <!-- Large monitor behind (turned off) -->
  <rect x="0" y="0" width="800" height="400" fill="#1a1a1a"/>
  <rect x="8" y="8" width="784" height="384" fill="#1f1f1f" stroke="#333" stroke-width="2"/>
  <!-- Subtle screen reflection -->
  <rect x="20" y="20" width="760" height="360" fill="url(#bgGradient)" opacity="0.15"/>
  
  <!-- Desk surface (light wood) -->
  <rect x="0" y="450" width="800" height="150" fill="#d8c8b0"/>
  <!-- Wood grain texture -->
  <g opacity="0.3">
    <line x1="0" y1="470" x2="800" y2="470" stroke="#c4b498" stroke-width="1"/>
    <line x1="0" y1="495" x2="800" y2="495" stroke="#c4b498" stroke-width="0.8"/>
    <line x1="0" y1="520" x2="800" y2="520" stroke="#c4b498" stroke-width="1.2"/>
    <line x1="0" y1="545" x2="800" y2="545" stroke="#c4b498" stroke-width="0.6"/>
    <line x1="0" y1="570" x2="800" y2="570" stroke="#c4b498" stroke-width="1"/>
    <line x1="0" y1="595" x2="800" y2="595" stroke="#c4b498" stroke-width="0.8"/>
  </g>
  
  <!-- Smartphone -->
  <rect x="58" y="478" width="58" height="104" rx="7" ry="7" fill="#151515" stroke="#444" stroke-width="2.5"/>
  <rect x="68" y="492" width="38" height="56" fill="#222" rx="3"/>
  <!-- Phone screen reflection -->
  <ellipse cx="87" cy="515" rx="12" ry="20" fill="#fff" opacity="0.08"/>
  
  <!-- Orange cable -->
  <path d="M0 518 Q35 505 65 528 Q85 542 125 518 Q175 495 235 485 Q280 478 320 475" 
        fill="none" stroke="#ff7722" stroke-width="6" stroke-linecap="round" filter="url(#softShadow)"/>
  <!-- Cable highlight -->
  <path d="M0 516 Q35 503 65 526" fill="none" stroke="#ff9955" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  
  <!-- White paper -->
