    <!-- Cat body with fur gradient -->
    <ellipse cx="400" cy="418" rx="58" ry="88" fill="url(#furGradient)" stroke="#c0c0c0" stroke-width="2"/>
    <!-- Fur texture overlay -->
    <ellipse cx="400" cy="418" rx="58" ry="88" fill="url(#furTexture)"/>
    
    <!-- Back patch with gradient -->
