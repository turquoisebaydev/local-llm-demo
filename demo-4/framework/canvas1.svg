    <ellipse cx="429" cy="250" rx="3" ry="3.5" fill="#fff" opacity="0.95"/>
    <ellipse cx="371" cy="256" rx="1.5" ry="2" fill="#fff" opacity="0.7"/>
    <ellipse cx="425" cy="256" rx="1.5" ry="2" fill="#fff" opacity="0.7"/>
    
    <!-- Nose -->
