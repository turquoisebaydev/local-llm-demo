  <text x="128" y="545" font-family="sans-serif" font-size="9" fill="#666" transform="rotate(-5 128 545)">Note</text>
  
  <!-- White object on right -->
  <rect x="698" y="468" width="84" height="104" fill="#fff" transform="rotate(3 698 468)" filter="url(#softShadow)"/>
  
  <!-- Laptop base -->
