    <path d="M395 290 Q400 298 398 302" fill="none" stroke="#777" stroke-width="1.2"/>
    <path d="M405 290 Q400 298 402 302" fill="none" stroke="#777" stroke-width="1.2"/>
    
    <!-- Whiskers (varying thickness and length) -->
