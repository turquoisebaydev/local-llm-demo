    <path d="M447 233 L468 182 L434 228 Z" fill="#e8dcc8" stroke="#9a8b7a" stroke-width="2.5"/>
    <!-- Inner ears -->
    <path d="M356 231 L341 198 L363 229 Z" fill="radial-gradient(circle, #ffc9c9 0%, #eebbbb 100%)" opacity="0.9"/>
    <path d="M444 231 L459 198 L437 229 Z" fill="radial-gradient(circle, #ffc9c9 0%, #eebbbb 100%)" opacity="0.9"/>
    <!-- Ear fur texture -->
    <path d="M358 228 Q345 210 350 195 M442 228 Q455 210 450 195" fill="none" stroke="#c0b0a0" stroke-width="1" opacity="0.5"/>
    
    <!-- Eyes with gradient -->
