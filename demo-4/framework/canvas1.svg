    <text x="140" y="434" font-family="sans-serif" font-size="8" fill="#fff">App</text>
  </g>
  
  <!-- Dock -->
  <rect x="178" y="442" width="444" height="16" rx="6" fill="#252525" opacity="0.75"/>
  <g>
    <rect x="192" y="445" width="16" height="16" rx="3.5" fill="#4285f4"/>
    <rect x="213" y="445" width="16" height="16" rx="3.5" fill="#34a853"/>
    <rect x="234" y="445" width="16" height="16" rx="3.5" fill="#ea4335"/>
    <rect x="255" y="445" width="16" height="16" rx="3.5" fill="#fbbc04"/>
