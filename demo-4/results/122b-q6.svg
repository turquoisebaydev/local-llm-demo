  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background - dark monitor fills upper 2/3 -->
  <rect width="800" height="600" fill="url(#bgGradient)"/>
  
  <!-- Large monitor behind (turned off, dark) -->
  <rect x="0" y="0" width="800" height="400" fill="#1a1a1a"/>
  <rect x="10" y="10" width="780" height="380" fill="#222" stroke="#333" stroke-width="2"/>
  
  <!-- Desk surface (light wood, bottom 15%) -->
  <rect x="0" y="450" width="800" height="150" fill="#d4c4a8"/>
  
  <!-- Smartphone (black, left of laptop, face down) -->
  <rect x="60" y="480" width="55" height="100" rx="6" ry="6" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  
  <!-- Orange cable (from left, loops around phone, to laptop) -->
  <path d="M0 520 Q40 510 70 530 Q90 540 130 520 Q180 500 240 490" fill="none" stroke="#ff7722" stroke-width="5" stroke-linecap="round"/>
  
  <!-- White paper/note under cable -->
