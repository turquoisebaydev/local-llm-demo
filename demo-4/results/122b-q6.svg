  <!-- Trackpad (silver, centered below keyboard) -->
  <rect x="340" y="505" width="120" height="75" rx="6" ry="6" fill="#c9a880" stroke="#a08060" stroke-width="1.5"/>
  
  <!-- Cat - Devon Rex, centered, sitting upright -->
  <!-- Cat body (white/cream with gray tabby patches) -->
  <ellipse cx="400" cy="420" rx="55" ry="85" fill="#f9f9f9" stroke="#ccc" stroke-width="2"/>
  
  <!-- Back patch (gray/silver tabby) -->
  <ellipse cx="395" cy="390" rx="30" ry="45" fill="#9a8b7a" opacity="0.75"/>
  
  <!-- Cat head (heart-shaped) -->
  <ellipse cx="400" cy="260" rx="52" ry="48" fill="#f9f9f9" stroke="#ccc" stroke-width="2"/>
  
  <!-- Head mask (gray tabby stripes over eyes and ears) -->
  <ellipse cx="400" cy="255" rx="42" ry="32" fill="#9a8b7a" opacity="0.65"/>
  <!-- Tabby stripes on forehead -->
  <path d="M390 235 L400 250 L410 235" fill="none" stroke="#7a6b5a" stroke-width="3" stroke-linecap="round"/>
  <path d="M388 242 L400 255 L412 242" fill="none" stroke="#7a6b5a" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Large ears (high-set, triangular) -->
  <path d="M355 235 L335 185 L368 230 Z" fill="#e8dcc8" stroke="#9a8b7a" stroke-width="2"/>
  <path d="M445 235 L465 185 L432 230 Z" fill="#e8dcc8" stroke="#9a8b7a" stroke-width="2"/>
  <!-- Inner ears (pink) -->
  <path d="M358 233 L343 200 L365 231 Z" fill="#ffc9c9" opacity="0.85"/>
  <path d="M442 233 L457 200 L435 231 Z" fill="#ffc9c9" opacity="0.85"/>
  
  <!-- Large green-yellow eyes (wide-set) -->
  <ellipse cx="375" cy="255" rx="13" ry="16" fill="#9acd32" stroke="#2d4a15" stroke-width="1.2"/>
  <ellipse cx="425" cy="255" rx="13" ry="16" fill="#9acd32" stroke="#2d4a15" stroke-width="1.2"/>
  <!-- Pupils -->
  <ellipse cx="375" cy="255" rx="5" ry="7" fill="#1a1a1a"/>
  <ellipse cx="425" cy="255" rx="5" ry="7" fill="#1a1a1a"/>
  <!-- Eye highlights -->
  <circle cx="377" cy="252" r="2.5" fill="#fff" opacity="0.95"/>
  <circle cx="427" cy="252" r="2.5" fill="#fff" opacity="0.95"/>
  
  <!-- Pink nose -->
  <path d="M394 272 L406 272 L400 282 Z" fill="#ffb6c1" stroke="#cc8899" stroke-width="0.8"/>
  
  <!-- Mouth (subtle) -->
  <path d="M396 288 Q400 293 404 288" fill="none" stroke="#888" stroke-width="1.2"/>
  
  <!-- Whiskers (6 per side, white) -->
  <line x1="350" y1="272" x2="305" y2="266" stroke="#fff" stroke-width="1"/>
  <line x1="350" y1="278" x2="305" y2="278" stroke="#fff" stroke-width="1"/>
  <line x1="350" y1="284" x2="305" y2="290" stroke="#fff" stroke-width="1"/>
  <line x1="450" y1="272" x2="495" y2="266" stroke="#fff" stroke-width="1"/>
  <line x1="450" y1="278" x2="495" y2="278" stroke="#fff" stroke-width="1"/>
  <line x1="450" y1="284" x2="495" y2="290" stroke="#fff" stroke-width="1"/>
  
  <!-- Collar (light beige/taupe with buckle) -->
  <path d="M355 310 Q400 330 445 310" fill="none" stroke="#d0c4b8" stroke-width="16" stroke-linecap="round"/>
  <rect x="392" y="315" width="16" height="14" fill="#b8a898" stroke="#988878" stroke-width="1"/>
  
  <!-- Front paws (on trackpad, side by side) -->
  <ellipse cx="375" cy="515" rx="14" ry="18" fill="#f9f9f9" stroke="#ccc" stroke-width="2"/>
  <ellipse cx="425" cy="515" rx="14" ry="18" fill="#f9f9f9" stroke="#ccc" stroke-width="2"/>
  <!-- Paw toes -->
  <ellipse cx="370" cy="530" rx="5" ry="4" fill="#f9f9f9" stroke="#ccc" stroke-width="0.8"/>
  <ellipse cx="378" cy="532" rx="5" ry="4" fill="#f9f9f9" stroke="#ccc" stroke-width="0.8"/>
  <ellipse cx="420" cy="530" rx="5" ry="4" fill="#f9f9f9" stroke="#ccc" stroke-width="0.8"/>
  <ellipse cx="428" cy="532" rx="5" ry="4" fill="#f9f9f9" stroke="#ccc" stroke-width="0.8"/>
  
  <!-- Hind legs (body behind paws) -->
  <ellipse cx="400" cy="460" rx="22" ry="28" fill="#f9f9f9" stroke="#ccc" stroke-width="2"/>
  
  <!-- Tail (curled around right hind leg, striped) -->
  <path d="M430 470 Q470 500 475 525 Q480 545 465 550 Q445 555 430 535" fill="none" stroke="#f9f9f9" stroke-width="20" stroke-linecap="round"/>
  <!-- Tail stripes -->
