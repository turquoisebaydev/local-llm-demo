  <!-- Desktop icons on left side of screen -->
  <rect x="140" y="320" width="28" height="28" rx="4" fill="#4285f4"/>
  <text x="142" y="340" font-family="sans-serif" font-size="8" fill="#fff">Doc</text>
  
  <rect x="140" y="355" width="28" height="28" rx="4" fill="#34a853"/>
  <text x="142" y="375" font-family="sans-serif" font-size="8" fill="#fff">Fold</text>
  
  <rect x="140" y="390" width="28" height="28" rx="4" fill="#ea4335"/>
  <text x="142" y="410" font-family="sans-serif" font-size="8" fill="#fff">App</text>
  
  <!-- Dock at bottom of screen -->
