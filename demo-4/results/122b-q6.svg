  <path d="M442 495 Q468 520 472 538" fill="none" stroke="#9a8b7a" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <path d="M450 512 Q470 532 473 547" fill="none" stroke="#9a8b7a" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
</svg>
